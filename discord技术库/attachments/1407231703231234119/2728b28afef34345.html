<style>

#a-p-c .n-i:hover {color:#3498db;}

<div class="n-i" 
data-content='<b>以下涉及的tokens计数受模型波动可能会有影响，仅作参考</b><br>
<strong>模型首推：Gemini2.5Pro</strong><br>
<b>【35⚡不推荐】</b><br>
<b>- 极限·指令1(你输出的内容不能低于1500tokens)</b><br>
<b>- 相对稳妥·指令2(你输出的内容不能低于1350tokens)</b><br>
<b>- 指令1测试(10次对话平均占用tokens)</b><br>
正文：3200~超限tokens<br>
填表：1200~1500tokens<br>
结论：不稳定,建议+10⚡或者使用指令2(体验一般)<br>
<b>【45⚡推荐】</b><br>
<b>- 偏少·指令(你输出的内容不能低于1500tokens)</b><br>
<b>- 相对极限·指令(你输出的内容不能低于2000tokens)</b><br>
<b>【55⚡首电推荐】</b><br>
<b>- 指令(你输出的内容不能低于2000tokens)</b><br>
<b>【65⚡推荐】</b><br>
<b>- 指令(你输出的内容不能低于3000tokens)</b><br>
<b>高电体现在正文的内容会多出许多，填表tokens几乎无变化</b><br>
(填表内容就是状态栏和记忆栏)<br>
↓<br>
<strong>模型推荐：Gemini2.5Flash</strong><br>
(令我意外的是Flash的性能并不比Pro差多少，主要是不稳定，预算不足建议用Pro开局，后续可以转Flash，所以这里给到推荐)<br>
<b>【20⚡】</b><br>
<b>- 超级极限·指令1(你输出的内容不能低于2000tokens)</b><br>
<b>- 稳妥·指令2(你输出的内容不能低于1500tokens)</b><br>
<b>【25⚡推荐】</b><br>
<b>- 偏少·指令(你输出的内容不能低于2000tokens)</b><br>
(Gemini的tokens输出不是很稳定，比如同样的回复内容和指令刚刚用的好好的，偶尔某次重置后的回复就莫名截断了)<br>
↓<br>
<strong>模型备用1：Grok-4</strong><br>
<b>相比Gemini2.5Pro文风没差多少，但行文逻辑较怪，且不是很吃设定</b><br>
↓<br>
<strong>模型备用2：Claude4.0</strong><br>
<b>无严格tokens限制需求</b><br>
<b>很吃设定，但文风偏小白</b><br>'

<div class="n-i" 
data-content='<b>Gemini抽风兼容方案：</b><br>
<b>只有Gemini会因为模型波动而出现的抽风·极小概率</b><br>
<b>理论上任何正则卡使用Gemini都会有这种情况</b><br>
-当遇到卷轴没有生成的时候十成是因为正则替换出现错别字或漏字-<br>
↓<br>
这种情况不用管，我做了兼容（兼容的方法已经在魅魔藏经阁里给出了-写卡作者）：<br>
【角乱weqh码乱码色】<br>
↓<br>
针对的是这种情况，错别字或漏字<br>
【角巴】【角】<br>
↓<br>
我已经在正则方面做了巨大兼容，但架不住Gemini抽风。<br>
（我已经没招了，包括玩其他作者的卡偶尔也会遇到这种情况，此则无奈之举）<br>
↓<br>
为了保证全程的游玩体验，如果遇到上述情况请尝试以下方法：<br>
