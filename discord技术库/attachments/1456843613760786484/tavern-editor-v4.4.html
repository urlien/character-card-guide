<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒馆KV-Robust开发环境 V4.4</title>
<style>
    /* === 全局重置 & 基础样式 === */
    * {
        box-sizing: border-box;
    }
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background: #1e1e1e; 
        overflow: hidden; 
    }
    
    header {
        height: 50px; 
        background: #2d2d2d; 
        border-bottom: 1px solid #3e3e3e;
        display: flex; 
        align-items: center; 
        padding: 0 20px; 
        justify-content: space-between;
        color: #ccc; 
        user-select: none;
        flex-shrink: 0;
    }
    
    .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
        flex: 1;
        min-width: 0; /* 允许收缩 */
    }
    
    h1 { 
        font-size: 14px; 
        margin: 0; 
        color: #888; 
        display: flex; 
        align-items: center; 
        gap: 8px;
        flex-shrink: 0;
    }
    
    .badge { 
        background: #00897B; 
        color: #fff; 
        padding: 2px 6px; 
        border-radius: 4px; 
        font-size: 11px; 
        font-weight: bold; 
        letter-spacing: 0.5px; 
        box-shadow: 0 0 10px rgba(0, 137, 123, 0.4); 
    }

    /* 新增：项目标题样式 */
    .project-title-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
        max-width: 400px;
    }
    
    .project-title-input {
        background: transparent;
        border: 1px solid transparent;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        padding: 4px 8px;
        border-radius: 4px;
        width: 100%;
        min-width: 100px;
        transition: all 0.2s;
        text-overflow: ellipsis;
    }
    
    .project-title-input:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: #444;
    }
    
    .project-title-input:focus {
        background: #1e1e1e;
        border-color: #00897B;
        outline: none;
        box-shadow: 0 0 0 2px rgba(0, 137, 123, 0.2);
    }
    
    .project-title-input::placeholder {
        color: #666;
    }
    
    .title-edit-hint {
        color: #555;
        font-size: 11px;
        opacity: 0;
        transition: opacity 0.2s;
        white-space: nowrap;
    }
    
    .project-title-wrapper:hover .title-edit-hint {
        opacity: 1;
    }

    .controls { 
        display: flex; 
        gap: 15px; 
        align-items: center; 
        font-size: 13px; 
        flex-wrap: wrap;
        flex-shrink: 0;
    }
    
    .toggle-group { 
        display: flex; 
        align-items: center; 
        gap: 6px; 
        cursor: pointer; 
    }
    .toggle-group input { 
        accent-color: #00897B; 
        cursor: pointer; 
    }
    .toggle-group span { 
        color: #aaa; 
        transition: color 0.2s; 
    }
    .toggle-group:hover span { 
        color: #fff; 
    }

    button.action-btn {
        background: #444; 
        color: #fff; 
        border: 1px solid #555; 
        padding: 5px 12px; 
        border-radius: 4px; 
        cursor: pointer; 
        transition: all 0.2s; 
        font-size: 12px;
        display: flex; 
        align-items: center; 
        gap: 5px;
    }
    button.action-btn:hover { 
        background: #555; 
        border-color: #666; 
    }
    
    button.ai-btn {
        background: linear-gradient(135deg, #7B1FA2, #512DA8);
        border: 1px solid #9C27B0;
        font-weight: bold;
        display: flex; 
        align-items: center; 
        gap: 5px;
    }
    button.ai-btn:hover {
        background: linear-gradient(135deg, #9C27B0, #673AB7);
        box-shadow: 0 0 12px rgba(156, 39, 176, 0.5);
    }

    button.export-btn {
        background: linear-gradient(135deg, #2E7D32, #4CAF50);
        border: 1px solid #66BB6A;
    }
    button.export-btn:hover {
        background: linear-gradient(135deg, #4CAF50, #81C784);
        box-shadow: 0 0 12px rgba(76, 175, 80, 0.5);
    }
    button.load-btn {
        background: linear-gradient(135deg, #1976D2, #2196F3);
        border: 1px solid #42A5F5;
    }
    button.load-btn:hover {
        background: linear-gradient(135deg, #2196F3, #64B5F6);
        box-shadow: 0 0 12px rgba(33, 150, 243, 0.5);
    }

    #file-input {
        display: none;
    }

    .main-container { 
        display: flex; 
        height: calc(100% - 50px);
        position: relative;
        overflow: hidden;
        width: 100%;
    }
    
    .page-container {
        display: flex;
        flex-direction: column;
        position: relative;
        height: 100%;
        background: #1e1e1e;
        overflow: hidden;
        min-width: 200px;
        flex-shrink: 0;
    }
    #html-page {
        flex-shrink: 1;
        flex-grow: 1;
    }
    
    .page-header {
        background: #252526;
        padding: 8px 15px;
        border-bottom: 1px solid #3e3e3e;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        height: 40px;
        flex-shrink: 0;
    }
    
    .page-title {
        color: #ccc;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .page-actions {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .page-width-display {
        background: rgba(0, 0, 0, 0.3);
        color: #aaa;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: monospace;
        min-width: 60px;
        text-align: center;
    }
    
    .collapse-btn {
        background: transparent;
        border: none;
        color: #aaa;
        cursor: pointer;
        font-size: 12px;
        padding: 2px 6px;
        border-radius: 3px;
        transition: all 0.2s;
    }
    
    .collapse-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }
    
    .page-content {
        flex: 1 1 auto;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    
    textarea.code-input {
        flex: 1 1 auto;
        background: #1e1e1e;
        color: #d4d4d4;
        border: none;
        padding: 15px;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 13px;
        line-height: 1.5;
        resize: none;
        outline: none;
        white-space: pre;
        overflow-wrap: normal;
        overflow-x: auto;
        overflow-y: auto;
        height: 100%;
    }
    
    iframe.preview-frame {
        width: 100%;
        height: 100%;
        border: none;
        background: #1a1b20;
        display: block;
    }
    
    .resizer {
        width: 8px;
        background: #2d2d2d;
        cursor: col-resize;
        position: relative;
        z-index: 10;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        height: 100%;
    }
    
    .resizer:hover {
        background: #3e3e3e;
    }
    
    .resizer::after {
        content: "";
        width: 1px;
        height: 20px;
        background: #555;
        border-radius: 1px;
    }
    
    .page-container.collapsed {
        width: 40px !important;
        min-width: 40px !important;
        max-width: 40px !important;
        overflow: visible;
        flex-shrink: 0;
    }
    
    .page-container.collapsed .page-content {
        display: none;
    }
    
    .page-container.collapsed .page-header {
        border-right: 1px solid #3e3e3e;
        height: 100%;
        border-bottom: none;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        justify-content: center;
        padding: 0;
    }
    
    .page-container.collapsed .page-title {
        transform: rotate(180deg);
        white-space: nowrap;
        padding: 10px 0;
    }
    
    .page-container.collapsed .page-actions {
        display: none;
    }
    
    .page-container.collapsed .resizer {
        display: none;
    }
    
    .ai-modal {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        background: #252526;
        border: 1px solid #444;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        z-index: 1000;
        padding: 20px;
        display: none;
    }
    
    .ai-modal.active {
        display: block;
        animation: slideDown 0.3s ease-out;
    }
    
    @keyframes slideDown {
        from { top: -50px; opacity: 0; }
        to { top: 10px; opacity: 1; }
    }
    
    .ai-field {
        margin-bottom: 15px;
    }
    
    .ai-label {
        display: block;
        color: #aaa;
        font-size: 12px;
        margin-bottom: 5px;
    }
    
    .ai-input {
        width: 100%;
        background: #1e1e1e;
        border: 1px solid #3e3e3e;
        color: #fff;
        padding: 8px;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: sans-serif;
    }
    
    .ai-input:focus {
        border-color: #7B1FA2;
        outline: none;
    }
    
    textarea.ai-input {
        height: 80px;
        resize: vertical;
    }
    
    .ai-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 10px;
    }
    
    .ai-loading {
        color: #FFB74D;
        font-size: 12px;
        display: none;
        align-items: center;
        gap: 5px;
    }

    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: #2d2d2d;
    }
    ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    .filename-modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        background: #252526;
        border: 1px solid #444;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        z-index: 2000;
        padding: 20px;
        display: none;
    }
    
    .filename-modal.active {
        display: block;
        animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translate(-50%, -60%); }
        to { opacity: 1; transform: translate(-50%, -50%); }
    }
    
    .filename-header {
        color: #fff;
        font-size: 16px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .filename-input-group {
        margin-bottom: 15px;
    }
    
    .filename-label {
        display: block;
        color: #aaa;
        font-size: 12px;
        margin-bottom: 5px;
    }
    
    .filename-input {
        width: 100%;
        background: #1e1e1e;
        border: 1px solid #3e3e3e;
        color: #fff;
        padding: 8px;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: sans-serif;
        font-size: 14px;
    }
    
    .filename-input:focus {
        border-color: #2E7D32;
        outline: none;
        box-shadow: 0 0 0 1px rgba(46, 125, 50, 0.3);
    }
    
    .filename-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
    }
    
    .filename-hint {
        color: #888;
        font-size: 11px;
        margin-top: 5px;
        display: flex;
        justify-content: space-between;
    }
    
    .file-ext {
        color: #4CAF50;
        font-weight: bold;
    }
</style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>酒馆KV <span class="badge">V4.4</span></h1>
        <div class="project-title-wrapper">
            <input type="text" 
                   id="project-title" 
                   class="project-title-input" 
                   placeholder="点击输入项目名称..."
                   value="未命名项目"
                   spellcheck="false">
            <span class="title-edit-hint">✏️ 点击编辑</span>
        </div>
    </div>
    <div class="controls">
        <label class="toggle-group" title="刷新时保持当前滚动位置">
            <input type="checkbox" id="keep-scroll" checked>
            <span>🔒 滚动记忆</span>
        </label>
        <label class="toggle-group" title="内容从底部堆叠，模拟真实酒馆体验">
            <input type="checkbox" id="bottom-align" onchange="updatePreview()" checked>
            <span>⬇️ 底部对齐</span>
        </label>
        <button class="action-btn" onclick="toggleWordWrap()" title="切换编辑器自动换行">
            <span id="word-wrap-icon">🔤</span> <span id="word-wrap-text">自动换行</span>
        </button>
        <button class="action-btn export-btn" onclick="promptFilename()" title="导出所有内容为JSON文件">
            <span>📤</span> 导出
        </button>
        <button class="action-btn load-btn" onclick="document.getElementById('file-input').click()" title="从JSON文件加载内容">
            <span>📥</span> 加载
        </button>
        <input type="file" id="file-input" accept=".json" onchange="loadDataFromFile(this)">
        <button class="ai-btn" onclick="toggleAIModal()">✨ AI 灵感</button>
        <button class="action-btn" onclick="resetTemplate()">🔄 重置</button>
    </div>
</header>

<div id="filename-modal" class="filename-modal">
    <div class="filename-header">
        <span>📤 导出文件</span>
    </div>
    <div class="filename-input-group">
        <label class="filename-label">请输入文件名（无需添加 .json 后缀）</label>
        <input type="text" id="filename-input" class="filename-input" placeholder="例如：我的角色数据">
        <div class="filename-hint">
            <span id="filename-preview">未命名项目.json</span>
            <span class="file-ext">.json</span>
        </div>
    </div>
    <div class="filename-footer">
        <button class="action-btn" onclick="closeFilenameModal()">取消</button>
        <button class="action-btn export-btn" onclick="confirmExport()">确认导出</button>
    </div>
</div>

<div class="main-container">
    <div id="ai-modal" class="ai-modal">
        <h3 style="margin:0 0 15px 0; color:#fff; font-size:16px;">✨ Gemini 角色数据生成器</h3>
        <div class="ai-field">
            <label class="ai-label">Gemini API Key (本地存储，不上传)</label>
            <input type="password" id="gemini-key" class="ai-input" placeholder="输入你的 Google Gemini API Key">
        </div>
        <div class="ai-field">
            <label class="ai-label">角色概念描述 / 灵感 Prompt</label>
            <textarea id="ai-prompt" class="ai-input" placeholder="例如：一个在赛博朋克世界里经营拉面摊的前雇佣兵..."></textarea>
        </div>
        <div class="ai-footer">
            <span id="ai-status" class="ai-loading">✨ 连接中...</span>
            <button class="action-btn" onclick="toggleAIModal()">关闭</button>
            <button class="ai-btn" onclick="callGemini()">🚀 生成</button>
        </div>
    </div>

    <div class="page-container" id="preview-page" style="width: 500px;">
        <div class="page-header" onclick="togglePage('preview')">
            <div class="page-title">
                <span>🌐 实时预览</span>
            </div>
            <div class="page-actions">
                <span class="page-width-display" id="preview-width">500px</span>
                <button class="collapse-btn" onclick="togglePage('preview'); event.stopPropagation();">
                    <span id="preview-collapse-btn">↔</span>
                </button>
            </div>
        </div>
        <div class="page-content">
            <iframe id="preview-frame" class="preview-frame"></iframe>
        </div>
    </div>
    
    <div class="resizer" id="resizer-preview"></div>

    <div class="page-container" id="css-page" style="width: 300px;">
        <div class="page-header" onclick="togglePage('css')">
            <div class="page-title">
                <span>🎨 CSS 编辑器</span>
            </div>
            <div class="page-actions">
                <span class="page-width-display" id="css-width">300px</span>
                <button class="collapse-btn" onclick="togglePage('css'); event.stopPropagation();">
                    <span id="css-collapse-btn">↔</span>
                </button>
            </div>
        </div>
        <div class="page-content">
            <textarea id="css-input" class="code-input" placeholder="CSS代码..." spellcheck="false"></textarea>
        </div>
    </div>
    
    <div class="resizer" id="resizer-css"></div>

    <div class="page-container" id="html-page">
        <div class="page-header" onclick="togglePage('html')">
            <div class="page-title">
                <span>📄 HTML 编辑器</span>
            </div>
            <div class="page-actions">
                <span class="page-width-display" id="html-width">自动填充</span>
                <button class="collapse-btn" onclick="togglePage('html'); event.stopPropagation();">
                    <span id="html-collapse-btn">↔</span>
                </button>
            </div>
        </div>
        <div class="page-content">
            <textarea id="html-input" class="code-input" placeholder="HTML代码..." spellcheck="false"></textarea>
        </div>
    </div>
</div>

<script>
    // --- 本地存储工具函数 ---
    const STORAGE_KEYS = {
        HTML_CONTENT: 'tavern_editor_html',
        CSS_CONTENT: 'tavern_editor_css',
        GEMINI_KEY: 'tavern_editor_gemini_key',
        PROJECT_TITLE: 'tavern_editor_project_title' // 新增：项目标题
    };

    function saveToStorage(key, value) {
        try {
            localStorage.setItem(key, value);
        } catch (e) {
            console.warn('本地存储不可用:', e);
        }
    }

    function getFromStorage(key, defaultValue = '') {
        try {
            return localStorage.getItem(key) || defaultValue;
        } catch (e) {
            console.warn('本地存储不可用:', e);
            return defaultValue;
        }
    }

    function clearStorage(key) {
        try {
            localStorage.removeItem(key);
        } catch (e) {
            console.warn('本地存储清空失败:', e);
        }
    }

    // --- 项目标题功能 ---
    const projectTitleInput = document.getElementById('project-title');
    
    // 更新网页标题
    function updatePageTitle() {
        const title = projectTitleInput.value.trim() || '未命名项目';
        document.title = `${title} - 酒馆KV编辑器`;
    }
    
    // 获取当前项目标题（用于导出）
    function getProjectTitle() {
        return projectTitleInput.value.trim() || '未命名项目';
    }
    
    // 监听标题输入
    projectTitleInput.addEventListener('input', function() {
        updatePageTitle();
        saveToStorage(STORAGE_KEYS.PROJECT_TITLE, this.value);
    });
    
    // 选中时全选文字，方便修改
    projectTitleInput.addEventListener('focus', function() {
        this.select();
    });
    
    // 按Enter时失焦
    projectTitleInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            this.blur();
        }
    });

    // --- 导出/加载功能 ---
    let pendingExportData = null;
    
    function promptFilename() {
        try {
            pendingExportData = {
                version: '4.4',
                createTime: new Date().toISOString(),
                projectTitle: getProjectTitle(), // 保存项目标题
                htmlContent: htmlInput.value,
                cssContent: cssInput.value,
                geminiKey: document.getElementById('gemini-key').value.trim()
            };

            // 使用项目标题作为默认文件名
            const defaultName = getProjectTitle();
            const filenameInput = document.getElementById('filename-input');
            
            filenameInput.value = defaultName;
            filenameInput.select();
            
            updateFilenamePreview();
            document.getElementById('filename-modal').classList.add('active');
            filenameInput.addEventListener('input', updateFilenamePreview);
        } catch (e) {
            console.error('准备导出时出错:', e);
            showNotification('❌ 准备导出时出错');
        }
    }

    function updateFilenamePreview() {
        const filenameInput = document.getElementById('filename-input');
        const previewSpan = document.getElementById('filename-preview');
        
        let filename = filenameInput.value.trim();
        if (!filename) {
            filename = '未命名文件';
        }
        filename = filename.replace(/\.json$/i, '');
        previewSpan.textContent = filename + '.json';
    }

    function closeFilenameModal() {
        document.getElementById('filename-modal').classList.remove('active');
        pendingExportData = null;
    }

    function confirmExport() {
        if (!pendingExportData) {
            showNotification('❌ 导出数据不存在');
            return;
        }

        try {
            const filenameInput = document.getElementById('filename-input');
            let userFilename = filenameInput.value.trim();
            
            if (!userFilename) {
                userFilename = '未命名文件';
            }
            
            userFilename = userFilename.replace(/\.json$/i, '');
            userFilename = userFilename.replace(/[\\/:\*\?"<>\|]/g, '_');
            
            if (userFilename.length > 100) {
                userFilename = userFilename.substring(0, 100);
            }

            const jsonStr = JSON.stringify(pendingExportData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = userFilename + '.json';
            
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification(`✅ 导出成功：${userFilename}.json`);
            closeFilenameModal();
        } catch (e) {
            console.error('导出失败:', e);
            showNotification('❌ 导出失败，请查看控制台');
        }
    }

    function loadDataFromFile(fileInput) {
        const file = fileInput.files[0];
        if (!file) return;

        if (file.type !== 'application/json' && !file.name.endsWith('.json')) {
            showNotification('❌ 请选择JSON格式的文件');
            fileInput.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (!data || typeof data !== 'object') {
                    throw new Error('文件内容不是有效的JSON对象');
                }

                // 加载项目标题
                if (data.projectTitle !== undefined) {
                    projectTitleInput.value = data.projectTitle;
                    saveToStorage(STORAGE_KEYS.PROJECT_TITLE, data.projectTitle);
                    updatePageTitle();
                }
                
                if (data.htmlContent !== undefined) {
                    htmlInput.value = data.htmlContent;
                    saveToStorage(STORAGE_KEYS.HTML_CONTENT, data.htmlContent);
                }
                if (data.cssContent !== undefined) {
                    cssInput.value = data.cssContent;
                    saveToStorage(STORAGE_KEYS.CSS_CONTENT, data.cssContent);
                }
                if (data.geminiKey !== undefined) {
                    document.getElementById('gemini-key').value = data.geminiKey;
                    saveToStorage(STORAGE_KEYS.GEMINI_KEY, data.geminiKey);
                }

                updatePreview();
                showNotification('✅ 加载成功，已填充所有内容');
            } catch (e) {
                console.error('加载失败:', e);
                showNotification(`❌ 加载失败：${e.message}`);
            } finally {
                fileInput.value = '';
            }
        };

        reader.onerror = function() {
            console.error('文件读取失败');
            showNotification('❌ 文件读取失败，请重试');
            fileInput.value = '';
        };

        reader.readAsText(file, 'utf-8');
    }

    // --- 页面状态管理 ---
    const pageStates = {
        preview: { collapsed: false, width: 500, minWidth: 300, defaultWidth: 500 },
        css: { collapsed: false, width: 300, minWidth: 200, defaultWidth: 300 },
        html: { collapsed: false, minWidth: 200 }
    };
    
    let wordWrapEnabled = false;
    
    function togglePage(pageId) {
        const page = document.getElementById(`${pageId}-page`);
        const button = document.getElementById(`${pageId}-collapse-btn`);
        const isCollapsed = pageStates[pageId].collapsed;
        
        pageStates[pageId].collapsed = !isCollapsed;
        
        if (pageStates[pageId].collapsed) {
            page.classList.add('collapsed');
            button.textContent = '↕';
        } else {
            page.classList.remove('collapsed');
            button.textContent = '↔';
            
            if (pageId !== 'html') {
                const targetWidth = pageStates[pageId].width || pageStates[pageId].defaultWidth;
                page.style.width = `${targetWidth}px`;
                document.getElementById(`${pageId}-width`).textContent = `${targetWidth}px`;
            } else {
                document.getElementById('html-width').textContent = "自动填充";
            }
        }
        
        updatePageWidthDisplays();
        updatePreview();
    }
    
    // --- 拖拽调整宽度 ---
    let isResizing = false;
    let currentResizer = null;
    let startX = 0;
    let leftPage = null;
    let rightPage = null;
    let startLeftWidth = 0;
    let startRightWidth = 0;
    
    document.querySelectorAll('.resizer').forEach(resizer => {
        resizer.addEventListener('mousedown', initResize);
    });
    
    function initResize(e) {
        isResizing = true;
        currentResizer = e.target;
        
        if (currentResizer.id === 'resizer-preview') {
            leftPage = 'preview';
            rightPage = 'css';
        } else if (currentResizer.id === 'resizer-css') {
            leftPage = 'css';
            rightPage = 'html';
        }
        
        if (leftPage && rightPage) {
            const leftPageEl = document.getElementById(`${leftPage}-page`);
            const rightPageEl = document.getElementById(`${rightPage}-page`);
            
            startX = e.clientX;
            startLeftWidth = leftPageEl.offsetWidth;
            startRightWidth = rightPageEl.offsetWidth;
            
            document.addEventListener('mousemove', resize);
            document.addEventListener('mouseup', stopResize);
            
            e.preventDefault();
        }
    }
    
    function resize(e) {
        if (!isResizing || !leftPage || !rightPage) return;
        
        const leftPageEl = document.getElementById(`${leftPage}-page`);
        const rightPageEl = document.getElementById(`${rightPage}-page`);
        
        const dx = e.clientX - startX;
        const newLeftWidth = Math.max(pageStates[leftPage].minWidth, startLeftWidth + dx);
        
        let newRightWidth;
        if (rightPage === 'html') {
            newRightWidth = startRightWidth;
        } else {
            newRightWidth = Math.max(pageStates[rightPage].minWidth, startRightWidth - dx);
        }
        
        leftPageEl.style.width = `${newLeftWidth}px`;
        pageStates[leftPage].width = newLeftWidth;
        
        if (rightPage !== 'html') {
            rightPageEl.style.width = `${newRightWidth}px`;
            pageStates[rightPage].width = newRightWidth;
        }
        
        updatePageWidthDisplays();
    }
    
    function stopResize() {
        isResizing = false;
        leftPage = null;
        rightPage = null;
        document.removeEventListener('mousemove', resize);
        document.removeEventListener('mouseup', stopResize);
    }
    
    function updatePageWidthDisplays() {
        for (const pageId in pageStates) {
            const page = document.getElementById(`${pageId}-page`);
            const display = document.getElementById(`${pageId}-width`);
            
            if (pageStates[pageId].collapsed) {
                display.textContent = "已折叠";
            } else {
                if (pageId === 'html') {
                    const htmlWidth = page.offsetWidth;
                    display.textContent = `${htmlWidth}px`;
                } else {
                    const width = pageStates[pageId].width || page.offsetWidth;
                    display.textContent = `${width}px`;
                }
            }
        }
    }
    
    function toggleWordWrap() {
        wordWrapEnabled = !wordWrapEnabled;
        
        const htmlInput = document.getElementById('html-input');
        const cssInput = document.getElementById('css-input');
        const icon = document.getElementById('word-wrap-icon');
        const text = document.getElementById('word-wrap-text');
        
        if (wordWrapEnabled) {
            htmlInput.style.whiteSpace = 'pre-wrap';
            cssInput.style.whiteSpace = 'pre-wrap';
            icon.textContent = '🔤';
            text.textContent = '换行开';
        } else {
            htmlInput.style.whiteSpace = 'pre';
            cssInput.style.whiteSpace = 'pre';
            icon.textContent = '🔡';
            text.textContent = '换行关';
        }
    }
    
    function showNotification(message) {
        const existingNotification = document.querySelector('.notification');
        if (existingNotification) {
            existingNotification.remove();
        }
        
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.textContent = message;
        notification.style.cssText = `
            position: fixed;
            top: 70px;
            right: 20px;
            background: #00897B;
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10000;
            animation: fadeInOut 2s ease-in-out;
        `;
        
        document.body.appendChild(notification);
        
        if (!document.querySelector('#notification-style')) {
            const style = document.createElement('style');
            style.id = 'notification-style';
            style.textContent = `
                @keyframes fadeInOut {
                    0% { opacity: 0; transform: translateY(-10px); }
                    10% { opacity: 1; transform: translateY(0); }
                    90% { opacity: 1; transform: translateY(0); }
                    100% { opacity: 0; transform: translateY(-10px); }
                }
            `;
            document.head.appendChild(style);
        }
        
        setTimeout(() => {
            if (notification.parentNode) {
                notification.remove();
            }
        }, 2000);
    }
    
    // --- AI 逻辑 ---
    document.getElementById('gemini-key').value = getFromStorage(STORAGE_KEYS.GEMINI_KEY, '');
    
    function toggleAIModal() {
        document.getElementById('ai-modal').classList.toggle('active');
        if (!document.getElementById('ai-modal').classList.contains('active')) {
            const geminiKey = document.getElementById('gemini-key').value.trim();
            saveToStorage(STORAGE_KEYS.GEMINI_KEY, geminiKey);
        }
    }
    
    async function callGemini() {
        const apiKey = document.getElementById('gemini-key').value.trim();
        const userPrompt = document.getElementById('ai-prompt').value.trim();
        const statusEl = document.getElementById('ai-status');
        
        if (!apiKey) { alert('请输入 API Key'); return; }
        if (!userPrompt) { alert('请输入描述'); return; }
        
        saveToStorage(STORAGE_KEYS.GEMINI_KEY, apiKey);
        
        statusEl.style.display = 'flex';
        statusEl.innerText = '✨ 构思中...';
        
        const systemInstruction = `
            You are a Data Architect for a Roleplay Character Card.
            Convert the user's description into this exact JSON format:
            {
                "kv_block": "DGS_KV_PANEL_V2_START▶name::{name};;race::{race};;class::{class};;level::{level};;money::{money};;location::{location};;event::{event};;status::{status};;lust::{0-100};;submit::{0-100};;dev::{0-100};;round::{int};;◀DGS_KV_PANEL_V2_END",
                "suggestions": ["Button1", "Button2", "Button3"]
            }
            Language: Chinese (Simplified).
        `;
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            
            if (!response.ok) throw new Error('API Error');
            const data = await response.json();
            const resultJSON = JSON.parse(data.candidates[0].content.parts[0].text);
            applyAIResult(resultJSON);
            statusEl.innerText = '✅ 成功';
            setTimeout(() => { toggleAIModal(); statusEl.style.display = 'none'; }, 1000);
        } catch (error) {
            console.error(error);
            statusEl.innerText = '❌ 失败';
            alert('生成失败，请检查网络或 Key。');
        }
    }
    
    function applyAIResult(aiData) {
        let currentHTML = htmlInput.value;
        const kvRegex = /DGS_KV_PANEL_V2_START▶[\s\S]*?◀DGS_KV_PANEL_V2_END/;
        if (kvRegex.test(currentHTML)) {
            let cleanKV = aiData.kv_block.replace(/\\n/g, '');
            currentHTML = currentHTML.replace(kvRegex, cleanKV);
        }
        if (aiData.suggestions && aiData.suggestions.length >= 1) {
            let btnRegex = /<div class="teapot-btn" onclick="([\s\S]*?)">([\s\S]*?)<\/div>/g;
            let count = 0;
            currentHTML = currentHTML.replace(btnRegex, (match, script, text) => {
                if (count < aiData.suggestions.length) {
                    let newText = aiData.suggestions[count];
                    let newScript = `
                var t = document.querySelector('.chat .chat-bottom .uni-textarea .chat-input-scope textarea');
                if(t){
                    var v = t.value; 
                    t.value = v + (v?'\\\\\\\\n':'') + '${newText.replace(/'/g, "\\'") + " (AI建议)"}'; 
                    t.dispatchEvent(new Event('input'));
                }
            `;
                    count++;
                    return `<div class="teapot-btn" onclick="${newScript}">${newText}</div>`;
                }
                return match;
            });
        }
        htmlInput.value = currentHTML;
        saveToStorage(STORAGE_KEYS.HTML_CONTENT, currentHTML);
        htmlInput.dispatchEvent(new Event('input'));
    }
    
    // --- 编辑器逻辑 ---
    const htmlInput = document.getElementById('html-input');
    const cssInput = document.getElementById('css-input');
    const previewFrame = document.getElementById('preview-frame');
    const keepScrollCheckbox = document.getElementById('keep-scroll');
    const bottomAlignCheckbox = document.getElementById('bottom-align');
    
    function resetTemplate() {
        htmlInput.value = '';
        cssInput.value = '';
        projectTitleInput.value = '未命名项目';
        clearStorage(STORAGE_KEYS.HTML_CONTENT);
        clearStorage(STORAGE_KEYS.CSS_CONTENT);
        clearStorage(STORAGE_KEYS.PROJECT_TITLE);
        updatePageTitle();
        updatePreview();
        showNotification('编辑器已清空（本地存储已重置）');
    }
    
    let timeout;
    htmlInput.addEventListener('input', () => {
        saveToStorage(STORAGE_KEYS.HTML_CONTENT, htmlInput.value);
        clearTimeout(timeout);
        timeout = setTimeout(updatePreview, 500);
    });
    
    cssInput.addEventListener('input', () => {
        saveToStorage(STORAGE_KEYS.CSS_CONTENT, cssInput.value);
        clearTimeout(timeout);
        timeout = setTimeout(updatePreview, 500);
    });
    
    function updatePreview() {
        let htmlCode = htmlInput.value;
        let cssCode = cssInput.value;
        let isBottomAlign = bottomAlignCheckbox.checked;
        let currentScrollY = 0;
        if (keepScrollCheckbox.checked && previewFrame.contentWindow) {
            try { currentScrollY = previewFrame.contentWindow.scrollY; } catch(e) {}
        }
        
        if (!htmlCode.trim() && !cssCode.trim()) {
            htmlCode = '<div style="padding: 20px; color: #888; text-align: center;">请输入HTML和CSS代码以预览</div>';
        }
        
        const htmlParts = [
            `<!DOCTYPE html>
            <html lang="zh-CN">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <style>
                    ${cssCode}
                    
                    body { 
                        background-color: #1a1b20; color: #fff; 
                        margin: 0; padding: 20px; padding-bottom: 120px; 
                        font-family: sans-serif; 
                        ${isBottomAlign ? `
                            display: flex; 
                            flex-direction: column; 
                            justify-content: flex-end; 
                            min-height: 100vh;
                            box-sizing: border-box;
                        ` : ''}
                    }
                    .mock-ui-layer { 
                        position: fixed; bottom: 0; left: 0; right: 0; 
                        background: #2c2e33; padding: 15px; border-top: 1px solid #444; 
                        z-index: 2147483647;
                        box-sizing: border-box;
                    }
                    .mock-hint { color: #888; font-size: 12px; margin-bottom: 5px; display: block; }
                    .chat .chat-bottom .uni-textarea .chat-input-scope textarea { 
                        width: 100%; height: 60px; background: #111; color: #eee; 
                        border: 1px solid #555; border-radius: 4px; padding: 10px; 
                        font-family: monospace; resize: none; display: block; 
                        box-sizing: border-box;
                    }
                    .chat .chat-bottom .uni-textarea .chat-input-scope textarea:focus { border-color: #00897B; outline: none; }
                </style>
            </head>
            <body>
                <div id="user-content-wrapper">`,
            htmlCode,
            `   </div>
                <div class="mock-ui-layer">
                    <span class="mock-hint">👇 模拟酒馆输入框 (.chat .chat-bottom ... textarea)</span>
                    <div class="chat"><div class="chat-bottom"><div class="uni-textarea"><div class="chat-input-scope">
                        <textarea placeholder="点击上方按钮测试..."></textarea>
                    </div></div></div></div>
                </div>
                <script>
                    window.addEventListener('DOMContentLoaded', () => { window.scrollTo(0, ${currentScrollY}); });
                <\/script>
            </body>
            </html>`
        ];
        previewFrame.srcdoc = htmlParts.join('');
    }
    
    // --- 初始化 ---
    function initializeApp() {
        // 恢复项目标题
        projectTitleInput.value = getFromStorage(STORAGE_KEYS.PROJECT_TITLE, '未命名项目');
        updatePageTitle();
        
        // 恢复编辑器内容
        htmlInput.value = getFromStorage(STORAGE_KEYS.HTML_CONTENT, '');
        cssInput.value = getFromStorage(STORAGE_KEYS.CSS_CONTENT, '');
        
        updatePageWidthDisplays();
        updatePreview();
    }
    
    window.addEventListener('DOMContentLoaded', initializeApp);
    
    window.addEventListener('resize', () => {
        updatePageWidthDisplays();
    });

    window.addEventListener('beforeunload', () => {
        saveToStorage(STORAGE_KEYS.HTML_CONTENT, htmlInput.value);
        saveToStorage(STORAGE_KEYS.CSS_CONTENT, cssInput.value);
        saveToStorage(STORAGE_KEYS.GEMINI_KEY, document.getElementById('gemini-key').value.trim());
        saveToStorage(STORAGE_KEYS.PROJECT_TITLE, projectTitleInput.value);
    });

    // 文件名模态框键盘事件
    document.addEventListener('DOMContentLoaded', function() {
        const filenameInput = document.getElementById('filename-input');
        const filenameModal = document.getElementById('filename-modal');
        
        filenameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                confirmExport();
            }
        });
        
        filenameModal.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeFilenameModal();
            }
        });
    });
</script>
</body>
</html>
