<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>开局面板生成器 v2 · 增强版</title>
<style>
  :root{
    --bg:#f4f1ec; --panel:#ffffff; --line:#e3ddd2; --ink:#2c2622; --muted:#857b6e;
    --accent:#0f766e; --accent-2:#33a394; --radius:12px;
    --shadow:0 10px 30px rgba(60,45,25,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Microsoft YaHei','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .topbar h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.02em}
  .topbar .sub{font-size:12px;color:var(--muted)}
  .topbar .spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:7px 12px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-2);color:#fff}
  .btn:disabled{opacity:.4;cursor:default;border-color:var(--line);color:var(--muted)}
  .wrap{display:grid;grid-template-columns:minmax(360px,1fr) minmax(420px,1.1fr);gap:0;height:calc(100vh - 53px)}
  .col{overflow:auto;padding:18px}
  .col.editor{border-right:1px solid var(--line)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h2{font-size:13px;margin:0 0 10px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  label.field{display:block;font-size:13px;font-weight:600;margin-bottom:10px}
  label.field span{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-bottom:4px}
  input[type=text],textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:#fdfcfa;color:var(--ink)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
  input[type=number]{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:#fdfcfa;color:var(--ink)}
  input[type=number]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
  input[type=color]{width:100%;height:36px;border:1px solid var(--line);border-radius:8px;padding:2px;background:#fff;cursor:pointer}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .row > *{flex:1;min-width:0}
  .theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .theme-opt{border:2px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;text-align:center;font-size:13px;font-weight:700;transition:.15s;background:#fff}
  .theme-opt small{display:block;font-weight:500;color:var(--muted);font-size:11px;margin-top:3px}
  .theme-opt.on{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
  .sec{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;background:#fbfaf7}
  .sec.lv2{background:#f6f4ef}
  .sec.lv3{background:#f1eee8}
  .subtree{margin:10px 0 2px 6px;padding-left:12px;border-left:3px solid var(--accent);border-left-color:rgba(15,118,110,.35)}
  .subtree .sec{margin-bottom:8px}
  .sec-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .sec-head input{flex:1}
  .opt-item{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)}
  .opt-item:last-child{border-bottom:none;margin-bottom:0}
  .opt-row{display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
  .opt-row .lab{flex:1;min-width:80px}
  .opt-row .val{flex:1;min-width:100px}
  .opt-row .img{flex:1;min-width:80px}
  .opt-row .tip{flex:1;min-width:100px}
  .opt-row .size{width:70px;flex:0 0 auto}
  .opt-row .pos{width:100px;flex:0 0 auto}
  .opt-actions{display:flex;gap:4px;align-items:center;flex:0 0 auto}
  .mini{border:1px solid var(--line);background:#fff;border-radius:7px;width:30px;height:30px;flex:0 0 30px;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .mini:hover{border-color:#d9534f;color:#d9534f}
  .mini:disabled{opacity:.28;cursor:default;border-color:var(--line);color:var(--muted)}
  .mini.add{color:var(--accent);width:auto;flex:0 0 auto;padding:0 12px;font-size:13px;font-weight:600;gap:4px}
  .mini.add:hover{border-color:var(--accent);color:var(--accent)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:600}
  .seg button.on{background:var(--accent);color:#fff}
  .adv summary{cursor:pointer;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px}
  .preview-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .preview-bar .tag{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .preview-bar .tag.ok{color:#2e7d32;border-color:#a5d6a7;background:#edf7ed}
  .preview-bar .tag.warn{color:#b26a00;border-color:#ffcc80;background:#fff3e0}
  iframe.preview{width:100%;height:calc(100vh - 230px);border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}
  .hint{font-size:12px;color:var(--muted);margin:6px 0 0}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#2c2622;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .toast.show{opacity:1}
  .tree-col{display:flex;flex-direction:column;padding:0}
  .tree-bar{display:flex;align-items:baseline;gap:10px;padding:12px 16px 8px}
  .tree-bar .hint{margin:0}
  .tree-canvas{flex:1;overflow:auto;padding:10px 24px 40px}
  .tree{display:inline-block;min-width:100%}
  .tree ul{position:relative;display:flex;justify-content:center;padding-top:22px;margin:0;list-style:none}
  .tree li{position:relative;padding:22px 8px 0;display:flex;flex-direction:column;align-items:center}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:22px;border-top:2px solid var(--line)}
  .tree li::after{right:auto;left:50%;border-left:2px solid var(--line)}
  .tree li:only-child::before,.tree li:only-child::after{display:none}
  .tree li:only-child{padding-top:22px}
  .tree li:first-child::before,.tree li:last-child::after{border:0}
  .tree li:last-child::before{border-right:2px solid var(--line)}
  .tree > ul{padding-top:0}
  .tree > ul > li:only-child{padding-top:0}
  .tree ul ul::before{content:'';position:absolute;top:0;left:50%;width:0;height:22px;border-left:2px solid var(--line)}
  .node{position:relative;z-index:1;min-width:96px;max-width:180px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer;box-shadow:var(--shadow);transition:.14s;text-align:center}
  .node:hover{border-color:var(--accent);transform:translateY(-1px)}
  .node.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.16),var(--shadow)}
  .node.root{background:var(--accent);border-color:var(--accent);color:#fff;min-width:120px}
  .node .nm{font-weight:700;font-size:13px;line-height:1.3;word-break:break-word}
  .node .meta{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .node.root .meta{color:rgba(255,255,255,.8)}
  .node .badge{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);background:rgba(15,118,110,.1);border-radius:5px;padding:0 5px;margin-top:4px}
  .node-acts{position:absolute;top:-9px;right:-9px;display:none;gap:3px}
  .node:hover .node-acts{display:flex}
  .node-acts button{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.12)}
  .node-acts button.add:hover{border-color:var(--accent);color:var(--accent)}
  .node-acts button.del:hover{border-color:#d9534f;color:#d9534f}
  .node-add-root{margin-top:14px;border:1.5px dashed var(--line);background:#fff;color:var(--muted);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
  .node-add-root:hover{border-color:var(--accent);color:var(--accent)}
  .modal-backdrop{position:fixed;inset:0;background:rgba(30,24,18,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow:auto}
  .modal-backdrop.on{display:flex}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 30px 70px rgba(0,0,0,.3);width:100%;max-width:540px;max-height:calc(100vh - 80px);display:flex;flex-direction:column;animation:modalIn .16s ease}
  @keyframes modalIn{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:none}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .modal-head strong{font-size:15px}
  .modal-head .gear{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:0 8px}
  .modal-head .gear:hover{color:var(--accent)}
  .modal-x{border:none;background:none;font-size:22px;line-height:1;color:var(--muted);cursor:pointer;width:30px;height:30px;border-radius:8px}
  .modal-x:hover{background:#f0ece5;color:var(--ink)}
  .modal-body{padding:16px 18px 20px;overflow:auto}
  .modal-body .sec{border:none;background:none;padding:0;margin:0}
  .editor-settings{background:#f6f4ef;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:16px;display:none}
  .editor-settings.open{display:block}
  .editor-settings .setting-row{display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center}
  .editor-settings label{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer}
  .editor-settings label input[type="checkbox"]{width:auto;margin:0}
  .move-area{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .move-area .row{gap:6px}
  .move-area select{flex:2;min-width:120px}
  .custom-area{padding:12px;background:#f0ede8;border-radius:8px;margin-top:12px;border:1px solid var(--line)}
  .custom-area .row{margin-bottom:8px}
  .custom-area label.field{margin-bottom:6px}
  .custom-area input[type="range"]{width:100%}
  .custom-area .color-picker{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
  .custom-area .color-picker label{display:flex;flex-direction:column;font-size:11px;font-weight:500;color:var(--muted)}
  .custom-area .color-picker input[type="color"]{height:32px;padding:1px}
</style>
</head>
<body>
<div class="topbar">
  <h1>开局面板生成器 <span style="color:var(--accent)">v2</span></h1>
  <span class="sub">板块悬浮提示 · 自定义样式优先</span>
  <span class="spacer"></span>
  <button class="btn" id="btn-export-proj">导出项目</button>
  <button class="btn" id="btn-import-proj">导入项目</button>
  <input type="file" id="file-import" accept="application/json,.json" style="display:none">
  <span style="width:1px;height:22px;background:var(--line)"></span>
  <button class="btn" id="btn-copy-json">复制正则 JSON</button>
  <button class="btn" id="btn-dl-json">下载正则 JSON</button>
  <button class="btn primary" id="btn-dl-html">下载独立 HTML</button>
</div>

<div class="wrap">
  <div class="col tree-col">
    <div class="tree-bar">
      <strong style="font-size:13px">结构图</strong>
      <span class="hint">点节点编辑 · 点顶部「面板」改全局</span>
    </div>
    <div class="tree-canvas"><div class="tree" id="tree"></div></div>
  </div>
  <div class="col preview-col">
    <div class="preview-bar">
      <strong style="font-size:13px">实时预览</strong>
      <span class="tag" id="size-tag">—</span>
      <span class="spacer" style="flex:1"></span>
      <span class="hint" id="compliance">红线自检：—</span>
    </div>
    <iframe class="preview" id="preview" title="预览"></iframe>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <strong id="modal-title">编辑</strong>
      <button class="gear" id="gear-btn" title="编辑设置">⚙️</button>
      <button class="modal-x" id="modal-close" title="关闭">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="editor-settings" id="editor-settings">
        <div class="setting-row">
          <label><input type="checkbox" data-setting="showSubLayout" checked> 子板块排列</label>
          <label><input type="checkbox" data-setting="showExclusive" checked> 互斥设置</label>
          <label><input type="checkbox" data-setting="showMove" checked> 移动操作</label>
          <label><input type="checkbox" data-setting="showCloneDel" checked> 复制/删除按钮</label>
          <label><input type="checkbox" data-setting="showImage" checked> 图片功能</label>
          <label><input type="checkbox" data-setting="showActualValue" checked> 实际值</label>
          <label><input type="checkbox" data-setting="showCustomPreset" checked> 自定义预输入</label>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* =========================================================================
 *  开局面板生成器 v2  —  生成器本体（增强版：板块悬浮提示 + 自定义样式优先）
 * ====================================================================== */

/* ---------- 工具 ---------- */
function escHtml(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escAttr(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escCss(s){return String(s==null?"":s).replace(/"/g,'\\"');}
function uid(){return "p"+Math.random().toString(36).slice(2,8);}
function hashId(str){var h=0;for(var i=0;i<str.length;i++){h=(Math.imul(31,h)+str.charCodeAt(i))|0;}return "ps2x"+(h>>>0).toString(36);}

/* ---------- 编辑器设置 ---------- */
var editorSettings = {
  showSubLayout: true,
  showExclusive: true,
  showMove: true,
  showCloneDel: true,
  showImage: true,
  showActualValue: true,
  showCustomPreset: true
};

/* ---------- 预设主题 ---------- */
var THEMES = {
  skeuo: {
    name: "拟物古风",
    desc: "羊皮纸·浮雕",
    accent: "#7a4a18",
    font: "'STKaiti','KaiTi','Microsoft YaHei',serif",
    meta: { bg: "#f3e6cd", text: "#3a2c1d", accent: "#7a4a18", border: "#c8ab7d", font: "'STKaiti','KaiTi','Microsoft YaHei',serif" },
    css: function(s, accent){
      return [
        s+"{--ac:"+accent+";position:relative;font-family:'STKaiti','KaiTi','Microsoft YaHei',serif;color:#3a2c1d;",
        "background:radial-gradient(circle at 22% 12%,rgba(255,255,255,.6),transparent 42%),linear-gradient(160deg,#f3e6cd,#e7d4b0);",
        "border:1px solid #c8ab7d;border-radius:14px;padding:18px;line-height:1.7;box-shadow:0 18px 44px rgba(84,60,25,.22),inset 0 1px 0 rgba(255,255,255,.55);}",
        s+"{box-sizing:border-box}"+s+" .ps2-sec,"+s+" .ps2-opt,"+s+" .ps2-custom,"+s+" .ps2-go,"+s+" .ps2-tabbar,"+s+" .ps2-tab,"+s+" .ps2-tabwrap,"+s+" .ps2-tabpanel{box-sizing:border-box}",
        s+" .ps2-title{font-size:21px;font-weight:800;letter-spacing:.05em;text-align:center;color:#6b3f15;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid rgba(120,80,30,.28);text-shadow:0 1px 0 rgba(255,255,255,.6)}",
        s+" .ps2-sec{background:linear-gradient(180deg,rgba(255,252,245,.8),rgba(247,235,214,.55));border:1px solid #d2b888;border-radius:11px;padding:12px 13px;margin-bottom:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 6px 14px rgba(93,67,31,.10)}",
        s+" .ps2-sec-h{font-weight:800;color:#7a4a18;font-size:15px;margin-bottom:9px;letter-spacing:.02em;display:flex;align-items:center;gap:6px;}",
        s+" .ps2-opts{display:flex;flex-wrap:wrap;gap:8px}",
        s+" .ps2-opt{position:relative;z-index:1;background:linear-gradient(180deg,#fffaf0,#ecdcbf);color:#4a3a22;border:1px solid #c9ad7e;border-radius:9px;padding:7px 13px;cursor:pointer;font:inherit;font-size:14px;box-shadow:0 3px 0 #c2a675,0 5px 10px rgba(89,61,26,.16);transition:.12s}",
        s+" .ps2-opt:hover{transform:translateY(-1px)}",
        s+" .ps2-opt:active{transform:translateY(2px);box-shadow:0 1px 0 #c2a675}",
        s+" .ps2-opt.on{background:linear-gradient(180deg,#7a4a18,#5c3811);color:#fff7e8;border-color:#5c3811;box-shadow:inset 0 2px 5px rgba(0,0,0,.35)}",
        s+" .ps2-custom{margin-top:9px;width:100%;border:1px solid #c9ad7e;border-radius:9px;background:rgba(255,253,247,.9);padding:8px 11px;color:#3a2c1d;font:inherit;font-size:13px;resize:vertical;min-height:42px}",
        s+" .ps2-go{display:block;width:100%;margin-top:6px;border:1px solid #5c3811;border-radius:11px;padding:11px;font:inherit;font-size:15px;font-weight:800;letter-spacing:.04em;color:#fff7e8;cursor:pointer;background:linear-gradient(180deg,#8a5420,#693f14);box-shadow:0 4px 0 #4a2c0d,0 9px 18px rgba(89,61,26,.28)}",
        s+" .ps2-go:active{transform:translateY(2px);box-shadow:0 1px 0 #4a2c0d}",
        s+" .ps2-boot{display:none}"
      ].join("");
    }
  },
  glass: {
    name: "玻璃态 Fluent",
    desc: "半透·柔光",
    accent: "#3b82f6",
    font: "system-ui,-apple-system,'Segoe UI','Microsoft YaHei',sans-serif",
    meta: { bg: "rgba(255,255,255,.72)", text: "#1f2733", accent: "#3b82f6", border: "rgba(255,255,255,.7)", font: "system-ui,-apple-system,'Segoe UI','Microsoft YaHei',sans-serif" },
    css: function(s, accent){
      return [
        s+"{--ac:"+accent+";position:relative;font-family:system-ui,-apple-system,'Segoe UI','Microsoft YaHei',sans-serif;color:#1f2733;",
        "background:linear-gradient(150deg,rgba(255,255,255,.72),rgba(236,242,250,.55));backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);",
        "border:1px solid rgba(255,255,255,.7);border-radius:18px;padding:18px;line-height:1.65;box-shadow:0 20px 50px rgba(31,49,84,.18),inset 0 1px 0 rgba(255,255,255,.85);}",
        s+"{box-sizing:border-box}"+s+" .ps2-sec,"+s+" .ps2-opt,"+s+" .ps2-custom,"+s+" .ps2-go,"+s+" .ps2-tabbar,"+s+" .ps2-tab,"+s+" .ps2-tabwrap,"+s+" .ps2-tabpanel{box-sizing:border-box}",
        s+" .ps2-title{font-size:20px;font-weight:700;text-align:center;color:#16202e;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid rgba(120,140,170,.25)}",
        s+" .ps2-sec{background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:12px 13px;margin-bottom:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 8px 20px rgba(31,49,84,.08)}",
        s+" .ps2-sec-h{font-weight:700;color:var(--ac);font-size:15px;margin-bottom:9px;display:flex;align-items:center;gap:6px;}",
        s+" .ps2-opts{display:flex;flex-wrap:wrap;gap:8px}",
        s+" .ps2-opt{position:relative;z-index:1;background:rgba(255,255,255,.55);color:#23314a;border:1px solid rgba(255,255,255,.8);border-radius:11px;padding:7px 14px;cursor:pointer;font:inherit;font-size:14px;box-shadow:0 4px 12px rgba(31,49,84,.10);transition:.15s}",
        s+" .ps2-opt:hover{background:rgba(255,255,255,.85);transform:translateY(-1px);box-shadow:0 8px 18px rgba(31,49,84,.16)}",

};

/* ---------- 导出引擎 ---------- */
function buildEngine(){
  return [
    "(function(img){",
      "var root=img.parentNode;if(!root)return;",
      "var p=root,n=0;while(p&&n<6){if(p.className&&(' '+p.className+' ').indexOf(' ps2-root ')>=0){root=p;break}p=p.parentNode;n=n+1}",
      "var hasC=function(el,k){return !!(el&&el.className&&(' '+el.className+' ').indexOf(' '+k+' ')>=0)};",
      "var addC=function(el,k){if(!hasC(el,k))el.className=el.className+' '+k};",
      "var delC=function(el,k){if(el&&el.className)el.className=(' '+el.className+' ').split(' '+k+' ').join(' ').replace(/(^\\s+)|(\\s+$)/g,'')};",
      "var up=function(el,attr){var c=0;while(el&&el!==root&&c<6){if(el.getAttribute&&el.getAttribute(attr)!==null)return el;el=el.parentNode;c=c+1}return null};",
      "var syncExclusive=function(el){",
        "var parent=el;var cnt=0;",
        "while(parent&&parent!==root&&cnt<6){if(parent.getAttribute&&parent.getAttribute('data-child-exclusive')==='1'){break;}parent=parent.parentNode;cnt=cnt+1;}",
        "if(!parent||parent===root)return;",
        "var current=null;var tmp=el;",
        "while(tmp&&tmp!==parent){if(tmp.className&&(' '+tmp.className+' ').indexOf(' ps2-sec ')>=0){current=tmp;break;}tmp=tmp.parentNode;}",
        "if(!current)return;",
        "var hasActive=function(sec){",
          "var btns=sec.getElementsByTagName('button');for(var i=0;i<btns.length;i=i+1){if(hasC(btns[i],'ps2-opt')&&hasC(btns[i],'on'))return true;}",
          "var tas=sec.getElementsByTagName('textarea');for(var j=0;j<tas.length;j=j+1){if(tas[j].value&&tas[j].value.replace(/(^\\s+)|(\\s+$)/g,''))return true;}",
          "var childSecs=sec.getElementsByTagName('div');for(var k=0;k<childSecs.length;k=k+1){if(childSecs[k]!==sec&&hasC(childSecs[k],'ps2-sec')&&hasActive(childSecs[k]))return true;}",
          "return false;",
        "};",
        "if(!hasActive(current))return;",
        "var clearSec=function(sec){",
          "var btns=sec.getElementsByTagName('button');for(var i=0;i<btns.length;i=i+1){if(hasC(btns[i],'ps2-opt')&&hasC(btns[i],'on'))delC(btns[i],'on');}",
          "var tas=sec.getElementsByTagName('textarea');for(var j=0;j<tas.length;j=j+1){tas[j].value='';}",
          "var childSecs=sec.getElementsByTagName('div');for(var k=0;k<childSecs.length;k=k+1){if(childSecs[k]!==sec&&hasC(childSecs[k],'ps2-sec')){clearSec(childSecs[k]);}}",
        "};",
        "var children=parent.children;",
        "for(var i=0;i<children.length;i=i+1){",
          "var child=children[i];if(child===current)continue;",
          "if(child.className&&(' '+child.className+' ').indexOf(' ps2-sec ')>=0){",
            "clearSec(child);",
          "}",
        "}",
      "};",
      "var pick=function(btn){",
        "var g=up(btn,'data-group');if(!g)return;",
        "var multi=g.getAttribute('data-multi')==='1';",
        "var max=parseInt(g.getAttribute('data-max'),10)||0;",
        "if(multi){",
          "if(max>0){",
            "var selected=[];",
            "var btns=g.getElementsByTagName('button');",
            "for(var i=0;i<btns.length;i=i+1){if(hasC(btns[i],'ps2-opt')&&hasC(btns[i],'on'))selected.push(btns[i]);}",
            "if(selected.length>=max){",
              "if(!hasC(btn,'on')){",
                "var oldest=selected[0];",
                "if(oldest)delC(oldest,'on');",
                "addC(btn,'on');",
              "}else{",
                "delC(btn,'on');",
              "}",
              "return;",
            "}",
          "}",
          "if(hasC(btn,'on'))delC(btn,'on');else addC(btn,'on');",
        "}else{",
          "var sib=g.getElementsByTagName('button');",
          "for(var i=0;i<sib.length;i=i+1){if(hasC(sib[i],'ps2-opt'))delC(sib[i],'on');}",
          "addC(btn,'on');",
        "}",
        "syncExclusive(btn);",
      "};",
      "var build=function(){var out=[];var secs=root.getElementsByTagName('div');for(var i=0;i<secs.length;i=i+1){var g=secs[i];if(!g.getAttribute||g.getAttribute('data-group')===null)continue;var title=g.getAttribute('data-title')||'';var vals=[];var btns=g.getElementsByTagName('button');for(var j=0;j<btns.length;j=j+1){if(hasC(btns[j],'on')){vals.push(btns[j].getAttribute('data-label')||'')}}var cf=g.getElementsByTagName('textarea');if(cf.length&&cf[0].value){var cv=cf[0].value.replace(/(^\\s+)|(\\s+$)/g,'');if(cv)vals.push(cv)}if(vals.length){out.push(title+'：'+vals.join('、'))}}return out.join('\\n')};",
      "var inject=function(){var body=build();var head=root.getAttribute('data-head')||'';var foot=root.getAttribute('data-foot')||'';var full='';if(head)full=full+head+'\\n';full=full+body;if(foot)full=full+'\\n'+foot;var ta=document.querySelector('textarea.uni-textarea-textarea')||document.querySelector('.chatMsgTextarea textarea')||document.querySelector('#send_textarea');if(!ta){var tas=document.getElementsByTagName('textarea');for(var ti=0;ti<tas.length;ti=ti+1){if(!root.contains(tas[ti])){ta=tas[ti];break}}}if(ta){ta.value=full;ta.dispatchEvent(new Event('input',{bubbles:true}));if(ta.focus)ta.focus()}else if(window.navigator&&navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(full)}};",
      "var seltab=function(tab){var box=up(tab,'data-tabs');if(!box)return;var idx=tab.getAttribute('data-tab');var tb=box.getElementsByTagName('button');for(var i=0;i<tb.length;i=i+1){if(hasC(tb[i],'ps2-tab'))delC(tb[i],'on')}addC(tab,'on');var pn=box.getElementsByTagName('div');for(var j=0;j<pn.length;j=j+1){if(pn[j].getAttribute&&pn[j].getAttribute('data-panel')!==null){if(pn[j].getAttribute('data-panel')===idx)addC(pn[j],'on');else delC(pn[j],'on')}}};",
      "var refresh=function(){var pv=root.querySelector('[data-preview-body]');if(pv){pv.textContent=build()}};",
      "root.addEventListener('click',function(e){var t=e.target,c=0;while(t&&t!==root&&c<5){if(hasC(t,'ps2-tab')){seltab(t);return}if(hasC(t,'ps2-opt')){pick(t);refresh();return}if(hasC(t,'ps2-go')){inject();return}t=t.parentNode;c=c+1}},true);",
      "root.addEventListener('input',function(e){var t=e.target;syncExclusive(t);refresh();},true);",
      "refresh();",
      "if(img.parentNode)img.parentNode.removeChild(img);",
    "})(this)"
  ].join("");
}

/* ---------- CSS 辅助 ---------- */
function tabsCss(s){
  return [
    s+" .ps2-tabbar{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:14px;border-bottom:2px solid rgba(128,128,128,.22)}",
    s+" .ps2-tab{position:relative;z-index:1;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:8px 15px;cursor:pointer;font:inherit;font-size:14px;font-weight:700;color:inherit;opacity:.5;transition:.15s}",
    s+" .ps2-tab:hover{opacity:.85}",
    s+" .ps2-tab.on{opacity:1;color:var(--ac);border-bottom-color:var(--ac)}",
    s+" .ps2-tabpanel{display:none;animation:ps2fade .18s ease}",
    s+" .ps2-tabpanel.on{display:block}",
    "@keyframes ps2fade{from{opacity:.4;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}"
  ].join("");
}
function tipCss(s){
  return [
    s+" .ps2-opt[data-tip]::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%) translateY(4px);background:rgba(26,22,18,.97);color:#fff;font-size:12px;line-height:1.45;font-weight:400;padding:7px 10px;border-radius:8px;max-width:240px;width:max-content;white-space:normal;text-align:left;letter-spacing:0;opacity:0;pointer-events:none;z-index:60;box-shadow:0 8px 20px rgba(0,0,0,.28);transition:opacity .15s ease,transform .15s ease}",
    s+" .ps2-opt[data-tip]::before{content:'';position:absolute;left:50%;bottom:calc(100% + 3px);transform:translateX(-50%);border:6px solid transparent;border-top-color:rgba(26,22,18,.97);opacity:0;pointer-events:none;z-index:60;transition:opacity .15s ease}",
    s+" .ps2-opt[data-tip]:hover::after,"+s+" .ps2-opt[data-tip]:focus-visible::after{opacity:1;transform:translateX(-50%) translateY(0)}",
    s+" .ps2-opt[data-tip]:hover::before,"+s+" .ps2-opt[data-tip]:focus-visible::before{opacity:1}"
  ].join("");
}
function previewCss(s){

    s+" .ps2-preview{margin-top:14px;border:1px dashed var(--ac);border-radius:10px;padding:10px 12px;background:rgba(127,127,127,.06)}",

    s+" .ps2-preview-body{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;min-height:1.6em;opacity:.92}",

    s+" .ps2-tabpanel > .ps2-sec{background:none;border:none;box-shadow:none;padding:0;margin:0}",
    s+" .ps2-sec > .ps2-children:first-child{margin-top:0}"
  ].join("");
}

/* ---------- 面板编译 ---------- */
function buildPanelParts(project){
  var themeKey = project.theme || 'skeuo';
  var custom = project.custom || {};
  var useCustom = custom.enabled === true;

  var customCss = '';
  if(useCustom){
    var bg = custom.bgColor || '#ffffff';
    var text = custom.textColor || '#1a1a1a';
    var accent = custom.accent || '#1976d2';
    var border = custom.borderColor || '#cccccc';
    var font = custom.fontFamily || 'system-ui';
    var bgImg = custom.bgImage ? ('background-image:url("'+escCss(custom.bgImage)+'");') : '';
    var bgOp = custom.bgOpacity != null ? ('opacity:'+custom.bgOpacity+';') : '';
    customCss = [
      '.ps2-root{',
        '--ac:'+accent+';',
        'background:'+bg+';'+bgImg,
        'color:'+text+';',
        'border-color:'+border+';',
        'font-family:'+font+';',
        'border-radius:12px;border:1px solid '+border+';padding:18px;line-height:1.6;',
        bgOp,
      '}',
      '.ps2-root .ps2-title{color:'+accent+';border-bottom-color:'+border+';}',
      '.ps2-root .ps2-sec{background:rgba(127,127,127,.06);border:1px solid '+border+';border-radius:8px;padding:12px 13px;margin-bottom:12px;}',
      '.ps2-root .ps2-sec-h{color:'+accent+';display:flex;align-items:center;gap:6px;}',
      '.ps2-root .ps2-opt{background:'+bg+';color:'+text+';border:1px solid '+border+';border-radius:6px;padding:7px 14px;cursor:pointer;font:inherit;font-size:14px;transition:.12s;}',
      '.ps2-root .ps2-opt:hover{background:rgba(0,0,0,.04);}',
      '.ps2-root .ps2-opt.on{background:'+accent+';color:#fff;border-color:'+accent+';}',
      '.ps2-root .ps2-custom{background:'+bg+';border:1px solid '+border+';color:'+text+';border-radius:6px;padding:8px 11px;font:inherit;font-size:13px;resize:vertical;min-height:42px;}',
      '.ps2-root .ps2-go{background:'+accent+';color:#fff;border:none;border-radius:8px;padding:12px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.12s;}',
      '.ps2-root .ps2-go:hover{filter:brightness(.92);}',
      '.ps2-root .ps2-preview{border-color:'+accent+';}',
      '.ps2-root .ps2-tab{color:'+text+';}',
      '.ps2-root .ps2-tab.on{color:'+accent+';border-bottom-color:'+accent+';}',
      '.ps2-root .ps2-boot{display:none;}',
      '.ps2-root .ps2-tip-img{display:inline-block;vertical-align:middle;margin-right:2px;}'
    ].join('');
  }

  var theme = THEMES[themeKey] || THEMES.skeuo;
  var themeCss = useCustom ? '' : theme.css('.ps2-root', project.accent || '#7a4a18');

  var allCss = (useCustom ? customCss : themeCss) + tabsCss('.ps2-root') + tipCss('.ps2-root') + previewCss('.ps2-root') + nestCss('.ps2-root');

  function ownGroup(node){
    if(!(node.options && node.options.length) && !node.allowCustom) return "";
    var opts = (node.options||[]).map(function(o){
      var tip = o.tip ? (" data-tip=\""+escAttr(o.tip)+"\"") : "";
      var actual = (o.value !== undefined && o.value !== null && o.value !== "") ? o.value : o.label;
      var imgHtml = "";
      if(o.image && o.image.trim()){
        var size = o.imageSize || 16;
        var pos = o.imagePosition || 'left';
        var style = "width:"+size+"px;height:"+size+"px;object-fit:contain;display:inline-block;vertical-align:middle;";
        if(pos === 'left') style += "margin-right:4px;";
        else if(pos === 'right') style += "margin-left:4px;";
        else if(pos === 'top') style += "display:block;margin:0 auto 2px;";
        else if(pos === 'bottom') style += "display:block;margin:2px auto 0;";
        imgHtml = "<img src=\""+escAttr(o.image.trim())+"\" alt=\"\" style=\""+style+"\">";
      }
      var content = "";
      if(o.imagePosition === 'top') content = imgHtml + "<span>"+escHtml(o.label)+"</span>";
      else if(o.imagePosition === 'bottom') content = "<span>"+escHtml(o.label)+"</span>" + imgHtml;
      else if(o.imagePosition === 'right') content = "<span>"+escHtml(o.label)+"</span>" + imgHtml;
      else content = imgHtml + "<span>"+escHtml(o.label)+"</span>";
      return "<button type=\"button\" class=\"ps2-opt\" data-label=\""+escAttr(actual)+"\""+tip+">"+content+"</button>";
    }).join("");
    var custom = "";
    if(node.allowCustom){
      var hasPreset = node.customPreset && node.customDefault && node.customDefault.trim();
      var val = (hasPreset && node.customPreset) ? node.customDefault : "";
      var ph = node.customHint || "自定义填写…";
      custom = "<textarea class=\"ps2-custom\" placeholder=\""+escAttr(ph)+"\""+(val ? ">"+escHtml(val)+"</textarea>" : "></textarea>");
    }
    var maxAttr = (node.selection==="multiple" && node.maxSelections > 0) ? (" data-max=\""+node.maxSelections+"\"") : "";
    return "<div class=\"ps2-group\" data-group data-multi=\""+(node.selection==="multiple"?"1":"0")+"\" data-title=\""+escAttr(node.title)+"\""+maxAttr+">"
      + "<div class=\"ps2-opts\">"+opts+"</div>"+custom+"</div>";
  }
  function nodeIconMarkup(node){
    if(!(node.icon && node.icon.trim())) return "";
    var nSize = node.iconSize || 20;
    var nPos = node.iconPosition || 'left';
    var nStyle = "width:"+nSize+"px;height:"+nSize+"px;object-fit:contain;vertical-align:middle;";
    if(nPos === 'left') nStyle += "margin-right:6px;";
    else if(nPos === 'right') nStyle += "margin-left:6px;";
    else if(nPos === 'top') nStyle += "display:block;margin:0 auto 4px;";
    else if(nPos === 'bottom') nStyle += "display:block;margin:4px auto 0;";
    return "<img src=\""+escAttr(node.icon.trim())+"\" alt=\"\" style=\""+nStyle+"\">";
  }
  function renderChildren(node, depth){
    var kids = node.children || [];
    if(!kids.length) return "";
    if(node.layout === "tabs"){
      var bar = kids.map(function(c, i){
        return "<button type=\"button\" class=\"ps2-tab"+(i===0?" on":"")+"\" data-tab=\""+i+"\">"+nodeIconMarkup(c)+escHtml(c.title||("板块"+(i+1)))+"</button>";
      }).join("");
      var panels = kids.map(function(c, i){
        return "<div class=\"ps2-tabpanel"+(i===0?" on":"")+"\" data-panel=\""+i+"\">"+renderNode(c, depth+1, true)+"</div>";
      }).join("");
      return "<div class=\"ps2-tabs\" data-tabs><div class=\"ps2-tabbar\">"+bar+"</div><div class=\"ps2-tabwrap\">"+panels+"</div></div>";
    }
    return "<div class=\"ps2-children\">"+kids.map(function(c){ return renderNode(c, depth+1, false); }).join("")+"</div>";
  }
  function renderNode(node, depth, asTab){
    var tipHtml = '';
    if(node.tip || node.tipImage){
      var tipText = node.tip || '';
      var tipImg = node.tipImage ? '<img src="'+escAttr(node.tipImage)+'" class="ps2-tip-img" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;margin-right:2px;">' : '';
      tipHtml = '<span class="ps2-tip-trigger" style="display:inline-flex;align-items:center;margin-left:4px;cursor:help;font-size:14px;opacity:0.6;" title="'+escAttr(tipText)+'">'+tipImg+'ⓘ</span>';
    }
    var iconHtml = "";
    if(node.icon && node.icon.trim()){
      var nSize = node.iconSize || 20;
      var nPos = node.iconPosition || 'left';
      var nStyle = "width:"+nSize+"px;height:"+nSize+"px;object-fit:contain;vertical-align:middle;";
      if(nPos === 'left') nStyle += "margin-right:6px;";
      else if(nPos === 'right') nStyle += "margin-left:6px;";
      else if(nPos === 'top') nStyle += "display:block;margin:0 auto 4px;";
      else if(nPos === 'bottom') nStyle += "display:block;margin:4px auto 0;";
      iconHtml = "<img src=\""+escAttr(node.icon.trim())+"\" alt=\"\" style=\""+nStyle+"\">";
    }
    var titleContent;
    var nIconPos = node.iconPosition || 'left';
    if(nIconPos === 'right') titleContent = "<span class=\"ps2-sec-title\">"+escHtml(node.title)+"</span>"+iconHtml+tipHtml;
    else if(nIconPos === 'bottom') titleContent = "<span class=\"ps2-sec-title\">"+escHtml(node.title)+"</span>"+iconHtml+tipHtml;
    else titleContent = iconHtml+"<span class=\"ps2-sec-title\">"+escHtml(node.title)+"</span>"+tipHtml;
    var header = asTab ? "" : ("<div class=\"ps2-sec-h\">"+titleContent+"</div>");
    var body = ownGroup(node) + renderChildren(node, depth);
    if(!body) body = "<div class=\"ps2-opts\"></div>";
    var attr = "";
    if(node.children && node.children.length && node.childExclusive){
      attr = " data-child-exclusive=\"1\"";
    }
    return "<div class=\"ps2-sec ps2-lv"+depth+"\""+attr+">"+header+body+"</div>";
  }

  var secHtml;
  if(project.rootLayout === "tabs" && project.sections.length){
    var rbar = project.sections.map(function(sec, i){
      return "<button type=\"button\" class=\"ps2-tab"+(i===0?" on":"")+"\" data-tab=\""+i+"\">"+nodeIconMarkup(sec)+escHtml(sec.title||("板块"+(i+1)))+"</button>";
    }).join("");
    var rpanels = project.sections.map(function(sec, i){
      return "<div class=\"ps2-tabpanel"+(i===0?" on":"")+"\" data-panel=\""+i+"\">"+renderNode(sec, 1, true)+"</div>";
    }).join("");
    secHtml = "<div class=\"ps2-tabs\" data-tabs><div class=\"ps2-tabbar\">"+rbar+"</div><div class=\"ps2-tabwrap\">"+rpanels+"</div></div>";
  } else {
    secHtml = project.sections.map(function(sec){ return renderNode(sec, 1, false); }).join("");
  }

  var titleIcon = "";
  if(project.icon && project.icon.trim()){
    var iconSize = project.iconSize || 24;
    var iconPos = project.iconPosition || 'left';
    var style = "width:"+iconSize+"px;height:"+iconSize+"px;object-fit:contain;vertical-align:middle;";
    if(iconPos === 'left') style += "margin-right:6px;";
    else if(iconPos === 'right') style += "margin-left:6px;";
    else if(iconPos === 'top') style += "display:block;margin:0 auto 4px;";
    else if(iconPos === 'bottom') style += "display:block;margin:4px auto 0;";
    titleIcon = "<img src=\""+escAttr(project.icon.trim())+"\" alt=\"\" style=\""+style+"\">";
  }

/* ---- 分段阈值 ---- */
var MAX_RAW = 17000;
function rawLenOf(s){ return String(s).length; }
function splitByRawLen(str, limit){
  var pieces = [], i = 0, n = str.length;
  while(i < n){
    var end = Math.min(n, i + limit);
    if(end < n){ var c = str.charCodeAt(end-1); if(c >= 0xD800 && c <= 0xDBFF) end -= 1; }
    pieces.push(str.slice(i, end));
    i = end;
  }
  return pieces;
}
function makeRule(replaceString, token){
  return { id: -1, replaceString: replaceString, scriptName: token, findRegex: token };
}
function buildRegexRules(project){
  var parts = buildPanelParts(project);
  var full = parts.styleTag + parts.rootHtml;
  var trigger = project.trigger || "<开局面板>";
  var rawLen = rawLenOf(full);
  var star = full.indexOf("*") >= 0;
  var base = String(trigger).replace(/[<>]/g, "");
  var rules, segments, maxSeg;
  if(rawLen <= MAX_RAW){
    rules = [ makeRule(full, trigger) ];
    segments = 1; maxSeg = rawLen;
  } else {
    var reserve = base.length + 8;
    var chunks = splitByRawLen(full, MAX_RAW - reserve);
    rules = []; maxSeg = 0;
    for(var k=0; k<chunks.length; k++){
      var token = (k===0) ? trigger : ("<"+base+"_p"+k+">");
      var nextMarker = (k < chunks.length-1) ? ("<"+base+"_p"+(k+1)+">") : "";
      var repl = chunks[k] + nextMarker;
      maxSeg = Math.max(maxSeg, rawLenOf(repl));
      rules.push(makeRule(repl, token));
    }
    segments = chunks.length;
  }
  return { rules: rules, trigger: trigger, rawLen: rawLen, segments: segments, maxSeg: maxSeg, star: star };
}
function buildRegexJson(project){
  var r = buildRegexRules(project);
  var bundle = { pageDepth: 2, statusbar: "", beginning: r.trigger, regex_scripts: r.rules };
  return { json: JSON.stringify(bundle, null, 2), rawLen: r.rawLen, segments: r.segments, maxSeg: r.maxSeg, star: r.star };
}

/* ---------- 路径寻址 ---------- */
function nodeByPath(path){
  var idx = String(path).split(".");
  var node = null, list = project.sections;
  for(var i=0;i<idx.length;i++){
    node = list[Number(idx[i])];
    if(!node) return null;
    if(!node.children) node.children = [];
    list = node.children;
  }
  return node;
}
function parentOf(path){
  var idx = String(path).split(".");
  var list = project.sections;
  for(var i=0;i<idx.length-1;i++){ list = list[Number(idx[i])].children; }
  return { list: list, index: Number(idx[idx.length-1]) };
}
function siblingPath(path, delta){
  var idx = String(path).split(".");
  idx[idx.length-1] = String(Number(idx[idx.length-1]) + delta);
  return idx.join(".");
}
function swap(arr, a, b){ var t = arr[a]; arr[a] = arr[b]; arr[b] = t; }

/* ---------- 复制函数 ---------- */
function cloneOptionObject(o){
  return {
    id: uid(),
    label: o.label || "",
    value: o.value || "",
    tip: o.tip || "",
    image: o.image || "",
    imageSize: o.imageSize || 16,
    imagePosition: o.imagePosition || "left"
  };
}
function cloneNodeObject(node, depth){
  var newNode = {
    id: uid(),
    title: node.title || "板块",
    selection: node.selection || "single",
    maxSelections: node.maxSelections || 0,
    allowCustom: !!node.allowCustom,
    customHint: node.customHint || "",
    customPreset: !!node.customPreset,
    customDefault: node.customDefault || "",
    layout: node.layout || "stack",
    childExclusive: !!node.childExclusive,
    icon: node.icon || "",
    iconSize: node.iconSize || 20,
    iconPosition: node.iconPosition || "left",
    tip: node.tip || "",
    tipImage: node.tipImage || "",
    options: (node.options || []).map(function(o){ return cloneOptionObject(o); }),
    children: []
  };
  if (depth < MAX_DEPTH) {
    (node.children || []).forEach(function(c){
      newNode.children.push(cloneNodeObject(c, depth+1));
    });
  }
  return newNode;
}
function cloneOption(path, oi){
  var node = nodeByPath(path);
  if(!node) return;
  var orig = node.options[oi];
  if(!orig) return;
  var cloned = cloneOptionObject(orig);
  node.options.splice(oi+1, 0, cloned);
}
function cloneNode(path){
  var orig = nodeByPath(path);
  if(!orig) return;
  var cloned = cloneNodeObject(orig, String(path).split(".").length);
  var parent = parentOf(path);
  parent.list.splice(parent.index+1, 0, cloned);
  var newPath = siblingPath(path, 1);
  selectedPath = newPath;
}

/* ---------- 层级移动 ---------- */
function promoteNode(path){
  var idx = String(path).split(".");
  if(idx.length <= 1) { toast("当前已是主板块，无法提升"); return; }
  var parent = parentOf(path);
  var node = parent.list[parent.index];
  parent.list.splice(parent.index, 1);
  project.sections.push(node);
  selectedPath = String(project.sections.length - 1);
  renderTree(); refreshPreview();
  toast("已提升为主板块");
}
function demoteNode(path){
  var idx = String(path).split(".");
  if(idx.length <= 1) { toast("主板块无法降级"); return; }
  var parent = parentOf(path);
  if(parent.index === 0) { toast("没有前一个兄弟节点，无法降级"); return; }
  var prevSibling = parent.list[parent.index - 1];
  var targetDepth = idx.length - 1;
  if(targetDepth >= MAX_DEPTH) { toast("前一个兄弟已达最大深度，无法再添加子板块"); return; }
  var node = parent.list[parent.index];
  parent.list.splice(parent.index, 1);
  if(!prevSibling.children) prevSibling.children = [];
  prevSibling.children.push(node);
  var newPath = siblingPath(path, -1) + "." + (prevSibling.children.length - 1);
  selectedPath = newPath;
  renderTree(); refreshPreview();
  toast("已降级为子板块");
}
function moveNodeTo(path, targetPath){
  if(targetPath === path) { toast("不能移动到自身"); return; }
  if(targetPath.indexOf(path + ".") === 0) { toast("不能移动到自身后代"); return; }
  var target = nodeByPath(targetPath);
  if(!target) { toast("目标板块不存在"); return; }
  var targetDepth = targetPath.split(".").length;
  if(targetDepth >= MAX_DEPTH) { toast("目标板块已达最大深度，无法再添加子板块"); return; }
  var node = nodeByPath(path);
  if(!node) { toast("当前板块不存在"); return; }
  var parent = parentOf(path);
  parent.list.splice(parent.index, 1);
  if(!target.children) target.children = [];
  target.children.push(node);
  var newPath = targetPath + "." + (target.children.length - 1);
  selectedPath = newPath;
  renderTree(); refreshPreview();
  toast("已平移到目标板块下");
}
function getAvailableTargets(path){
  var results = [];
  function traverse(list, prefix){
    for(var i=0;i<list.length;i++){
      var curPath = prefix ? prefix + "." + i : String(i);
      var node = list[i];
      if(curPath !== path && curPath.indexOf(path + ".") !== 0) {
        var depth = curPath.split(".").length;
        if(depth < MAX_DEPTH) {
          results.push({ path: curPath, title: node.title || "板块" });
        }
        if(node.children && node.children.length){
          traverse(node.children, curPath);
        }
      }
    }
  }
  traverse(project.sections, "");
  return results;
}

    + "<select data-act=\"node-iconpos\" data-path=\""+path+"\" style=\"width:100px;\">"

    + "<option value=\"bottom\""+(node.iconPosition==="bottom"?" selected":"")+">下</option>"
    + "</select>"
    + "</div></label>";

  var tipHtml = "<div class=\"field\"><span>板块悬浮提示文字（ⓘ 图标）</span><input type=\"text\" data-act=\"node-tip\" data-path=\""+path+"\" value=\""+escAttr(node.tip||"")+"\" placeholder=\"鼠标悬停在 ⓘ 上显示\"></div>"
    + "<div class=\"field\"><span>提示图片 URL（显示在 ⓘ 左侧）</span><input type=\"text\" data-act=\"node-tipimage\" data-path=\""+path+"\" value=\""+escAttr(node.tipImage||"")+"\" placeholder=\"https://...\"></div>";

  var targets = getAvailableTargets(path);
  var targetOptions = targets.map(function(t){
    return "<option value=\""+escAttr(t.path)+"\">"+escHtml(t.title)+" ("+escHtml(t.path)+")</option>";
  }).join("");
  var moveHtml = "";
  if(editorSettings.showMove){
    moveHtml = "<div class=\"move-area\">"
      + "<div class=\"row\">"
      + (depth > 1 ? "<button class=\"btn\" data-act=\"promote\" data-path=\""+path+"\">⬆ 提升为主板块</button>" : "")
      + (depth > 1 && !isFirst ? "<button class=\"btn\" data-act=\"demote\" data-path=\""+path+"\">⬇ 降级为子板块</button>" : "")

/* ========== 核心修复：保留 editor-settings 避免节点丢失 ========== */
function renderModalBody(){
  if(selectedPath==null) return;
  try {
    // 清空 modal-body 中除 .editor-settings 之外的所有子节点
    var children = modalBody.childNodes;
    var toRemove = [];
    for (var i = 0; i < children.length; i++) {
      var child = children[i];
      if (child.nodeType === 1 && child.classList && child.classList.contains('editor-settings')) continue;
      toRemove.push(child);
    }
    toRemove.forEach(function(child){ modalBody.removeChild(child); });

    if(selectedPath==="root"){
      modalTitle.textContent = "面板 · 全局设置";
      var contentRoot = document.createElement('div');
      contentRoot.innerHTML = globalForm();
      modalBody.appendChild(contentRoot);
      return;
    }

    var node = nodeByPath(selectedPath);
    if(!node){ 
      closeModal(); 
      toast("板块不存在"); 
      return; 
    }
    modalTitle.textContent = "编辑板块：" + (node.title||"板块");
    var content = document.createElement('div');
    content.innerHTML = nodeForm(node, selectedPath);
    modalBody.appendChild(content);
  } catch(err) {
    toast("渲染出错：" + err.message);
    closeModal();
  }
}

function openModal(path){ 
  if(modalBackdrop.classList.contains("on")) closeModal();
  selectedPath = path; 
  renderModalBody(); 
  modalBackdrop.classList.add("on"); 
  renderTree(); 
}
function closeModal(){ selectedPath = null; modalBackdrop.classList.remove("on"); renderTree(); }

function renderEditor(){ renderTree(); if(selectedPath!=null) renderModalBody(); }

    if(ap==="root") project.sections.push(newNode("新板块"));

    renderTree(); refreshPreview(); return;
  }
  var del = e.target.closest ? e.target.closest("[data-tdel]") : null;
  if(del){
    var dp = del.getAttribute("data-tdel");
    var pr = parentOf(dp); pr.list.splice(pr.index, 1);
    renderTree(); refreshPreview(); return;
  }
  var node = e.target.closest ? e.target.closest("[data-node]") : null;
  if(node){ openModal(node.getAttribute("data-node")); }
});

/* ---------- 模态点击 ---------- */
modalBody.addEventListener("click", function(e){
  var t = e.target.closest ? e.target.closest("[data-act]") : null;
  if(!t || t.disabled) return;
  var act = t.getAttribute("data-act");
  var path = t.getAttribute("data-path"), oi = Number(t.getAttribute("data-oi"));
  if(act==="theme"){ 
    project.theme = t.getAttribute("data-k");
    var meta = THEMES[project.theme].meta;
    if(!project.custom.enabled && meta) project.accent = meta.accent;
    if(project.custom.enabled && meta) {
      project.custom.bgColor = meta.bg || '#ffffff';
      project.custom.textColor = meta.text || '#1a1a1a';
      project.custom.accent = meta.accent || '#1976d2';
      project.custom.borderColor = meta.border || '#cccccc';
      project.custom.fontFamily = meta.font || 'system-ui';
    }
  }
  else if(act==="rootlayout"){ project.rootLayout = t.getAttribute("data-v"); }
  else if(act==="showpreview"){ project.showPreview = t.getAttribute("data-v")==="1"; }
  else if(act==="node-mode"){ nodeByPath(path).selection = t.getAttribute("data-v"); }
  else if(act==="node-layout"){ nodeByPath(path).layout = t.getAttribute("data-v"); }
  else if(act==="node-custom"){ nodeByPath(path).allowCustom = t.checked; }
  else if(act==="node-custompreset"){ nodeByPath(path).customPreset = t.checked; }
  else if(act==="node-exclusive"){ nodeByPath(path).childExclusive = t.checked; }
  else if(act==="custom-enable"){
    project.custom.enabled = t.checked;
    if(t.checked){
      var meta = THEMES[project.theme].meta || {};
      project.custom.bgColor = meta.bg || '#ffffff';
      project.custom.textColor = meta.text || '#1a1a1a';
      project.custom.accent = meta.accent || '#1976d2';
      project.custom.borderColor = meta.border || '#cccccc';
      project.custom.fontFamily = meta.font || 'system-ui';
    }
    renderModalBody();
    refreshPreview();
    return;
  }
  else if(act==="child-add"){ nodeByPath(path).children.push(newNode("子板块")); }
  else if(act==="opt-add"){ nodeByPath(path).options.push({id:uid(), label:"新选项", value:"", tip:"", image:"", imageSize:16, imagePosition:"left"}); }
  else if(act==="opt-del"){ nodeByPath(path).options.splice(oi,1); }
  else if(act==="opt-clone"){ cloneOption(path, oi); }
  else if(act==="opt-up"){ var os=nodeByPath(path).options; if(oi>0) swap(os, oi, oi-1); }
  else if(act==="opt-down"){ var od=nodeByPath(path).options; if(oi<od.length-1) swap(od, oi, oi+1); }
  else if(act==="node-up"){ var pu=parentOf(path); if(pu.index>0){ swap(pu.list, pu.index, pu.index-1); selectedPath = siblingPath(path, -1); } }
  else if(act==="node-down"){ var pw=parentOf(path); if(pw.index<pw.list.length-1){ swap(pw.list, pw.index, pw.index+1); selectedPath = siblingPath(path, 1); } }
  else if(act==="node-clone"){ cloneNode(path); }
  else if(act==="node-del"){ var pd=parentOf(path); pd.list.splice(pd.index,1); closeModal(); refreshPreview(); return; }
  else if(act==="promote"){ promoteNode(path); closeModal(); }
  else if(act==="demote"){ demoteNode(path); closeModal(); }
  else if(act==="move"){
    var sel = document.getElementById("move-target");
    if(sel && sel.value){
      moveNodeTo(path, sel.value);
      closeModal();
    } else {
      toast("请选择一个目标板块");
    }
  }
  else return;
  refreshPreview(); renderTree(); renderModalBody();
});

var preview = document.getElementById("preview");
var sizeTag = document.getElementById("size-tag");
var compliance = document.getElementById("compliance");

function refreshPreview(){
  preview.srcdoc = buildStandalone(project);
  var info = buildRegexJson(project);
  if(info.segments > 1){
    sizeTag.textContent = "共 " + info.rawLen + " 字 → 自动分 " + info.segments + " 段（最大段 " + info.maxSeg + "/17000）";
  } else {
    sizeTag.textContent = "replaceString " + info.rawLen + " / 17000 字（单段）";
  }
  var over = info.maxSeg > MAX_RAW;
  sizeTag.className = "tag " + (over ? "warn" : "ok");
  var eng = buildEngine();
  var checks = [];
  checks.push(!info.star ? "全段无*✓" : "含*✗");
  checks.push(eng.indexOf("=>")===-1 ? "无箭头✓" : "箭头✗");
  checks.push(eng.indexOf("`")===-1 ? "无模板串✓" : "模板串✗");
  checks.push((eng.indexOf("innerHTML")===-1) ? "无innerHTML✓" : "innerHTML✗");
  checks.push(!over ? "分段字数✓" : "字数超限✗");
  compliance.textContent = "红线自检：" + checks.join(" · ");
}

/* ---------- 项目存档 ---------- */
function normalizeProject(src){
  var p = {
    theme: (src && THEMES[src.theme]) ? src.theme : "skeuo",
    accent: (src && typeof src.accent==="string") ? src.accent : "#7a4a18",
    rootLayout: (src && src.rootLayout==="tabs") ? "tabs" : "stack",
    showPreview: src ? (src.showPreview !== false) : true,
    previewTitle: src && src.previewTitle!=null ? String(src.previewTitle) : "已选设定预览",
    previewPlaceholder: src && src.previewPlaceholder!=null ? String(src.previewPlaceholder) : "在上方选择选项，这里会实时汇总。",
    title: src && src.title!=null ? String(src.title) : "开局面板",
    icon: src && src.icon!=null ? String(src.icon) : "",
    iconSize: (src && typeof src.iconSize==="number") ? src.iconSize : 24,
    iconPosition: (src && src.iconPosition) ? src.iconPosition : "left",
    button: src && src.button!=null ? String(src.button) : "生成并注入",
    trigger: src && src.trigger!=null ? String(src.trigger) : "<开局面板>",
    head: src && src.head!=null ? String(src.head) : "",
    foot: src && src.foot!=null ? String(src.foot) : "",
    custom: {
      enabled: !!(src && src.custom && src.custom.enabled),
      bgColor: (src && src.custom && src.custom.bgColor) || "#ffffff",
      textColor: (src && src.custom && src.custom.textColor) || "#1a1a1a",
      accent: (src && src.custom && src.custom.accent) || "#1976d2",
      borderColor: (src && src.custom && src.custom.borderColor) || "#cccccc",
      fontFamily: (src && src.custom && src.custom.fontFamily) || "system-ui",
      bgImage: (src && src.custom && src.custom.bgImage) || "",
      bgOpacity: (src && src.custom && typeof src.custom.bgOpacity === "number") ? src.custom.bgOpacity : 1
    },
    sections: []
  };
  var secs = (src && Array.isArray(src.sections)) ? src.sections : [];
  p.sections = secs.map(function(sec){ return normalizeNode(sec, 1); });
  if(!p.sections.length){ p.sections = [ newNode("板块1") ]; }
  return p;
}
var MAX_DEPTH = 3;
function newNode(title){
  return { id:uid(), title:title||"新板块", selection:"single", maxSelections:0, allowCustom:false, customHint:"", customPreset:false, customDefault:"", layout:"stack", childExclusive:false, icon:"", iconSize:20, iconPosition:"left", tip:"", tipImage:"", options:[{id:uid(), label:"选项1", value:"", tip:"", image:"", imageSize:16, imagePosition:"left"}], children:[] };
}
function normalizeNode(sec, depth){
  var opts = (sec && Array.isArray(sec.options)) ? sec.options : [];
  var kids = (sec && Array.isArray(sec.children)) ? sec.children : [];
  return {
    id: uid(),
    title: sec && sec.title!=null ? String(sec.title) : "板块",
    selection: sec && sec.selection==="multiple" ? "multiple" : "single",
    maxSelections: (sec && typeof sec.maxSelections==="number") ? sec.maxSelections : 0,
    allowCustom: !!(sec && sec.allowCustom),
    customHint: sec && sec.customHint!=null ? String(sec.customHint) : "",
    customPreset: !!(sec && sec.customPreset),
    customDefault: sec && sec.customDefault!=null ? String(sec.customDefault) : "",
    layout: sec && sec.layout==="tabs" ? "tabs" : "stack",
    childExclusive: !!(sec && sec.childExclusive),
    icon: sec && sec.icon!=null ? String(sec.icon) : "",
    iconSize: (sec && typeof sec.iconSize==="number") ? sec.iconSize : 20,
    iconPosition: (sec && sec.iconPosition) ? sec.iconPosition : "left",
    tip: sec && sec.tip!=null ? String(sec.tip) : "",
    tipImage: sec && sec.tipImage!=null ? String(sec.tipImage) : "",
    options: opts.map(function(o){
      return {
        id: uid(),
        label: o && o.label!=null ? String(o.label) : "选项",
        value: o && o.value != null ? String(o.value) : "",
        tip: o && o.tip!=null ? String(o.tip) : "",
        image: o && o.image!=null ? String(o.image) : "",
        imageSize: (o && typeof o.imageSize==="number") ? o.imageSize : 16,

      };
    }),
    children: (depth < MAX_DEPTH) ? kids.map(function(k){ return normalizeNode(k, depth+1); }) : []
  };
}

});

document.getElementById("file-import").addEventListener("change", function(e){

    var cloneDelHtml = '';
    if (editorSettings.showCloneDel) {
      cloneDelHtml = '<button class="btn" data-act="node-clone" data-path="'+path+'" style="border-color:var(--accent);color:var(--accent)">⧁ 复制板块</button>';
    }

    return ''
      + '<label class="field"><span>板块名</span><input type="text" data-act="node-title" data-path="'+path+'" value="'+escAttr(node.title)+'"></label>'
      + iconHtml
      + tipHtml
      + '<label class="field"><span>选择方式</span><span class="seg"><button data-act="node-mode" data-path="'+path+'" data-v="single" class="'+(node.selection !== 'multiple' ? 'on' : '')+'">单选</button><button data-act="node-mode" data-path="'+path+'" data-v="multiple" class="'+(node.selection === 'multiple' ? 'on' : '')+'">多选</button></span></label>'
      + '<label class="field"><span>多选上限（0=不限）</span><input type="number" data-act="node-max" data-path="'+path+'" value="'+(node.maxSelections || 0)+'" min="0" step="1"></label>'
      + '<div class="field"><span>选项</span>'+opts+'<button class="mini add" data-act="opt-add" data-path="'+path+'" style="margin-top:2px">＋ 选项</button></div>'
      + customBlock
      + exclusiveBlock
      + layoutBlock
      + moveHtml
      + '<div class="row" style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px">'
      + (canChild ? '<button class="btn" data-act="child-add" data-path="'+path+'">＋ 加子板块</button>' : '')
      + cloneDelHtml
      + '<button class="btn" data-act="node-up" data-path="'+path+'"'+(isFirst ? ' disabled' : '')+'>← 前移</button>'
      + '<button class="btn" data-act="node-down" data-path="'+path+'"'+(isLast ? ' disabled' : '')+'>后移 →</button>'
      + (editorSettings.showCloneDel ? '<button class="btn" data-act="node-del" data-path="'+path+'" style="color:#d9534f;border-color:#e7b3b0">删除板块</button>' : '')
      + '</div>';
  };

  buildPanelParts = function(project){
    var themeKey = project.theme || 'skeuo';
    var custom = project.custom || {};
    var useCustom = custom.enabled === true;
    var customCss = '';
    if (useCustom) {
      var bg = custom.bgColor || '#ffffff';
      var text = custom.textColor || '#1a1a1a';
      var accent = custom.accent || '#1976d2';
      var border = custom.borderColor || '#cccccc';
      var font = custom.fontFamily || 'system-ui';
      var bgImg = custom.bgImage ? ('background-image:url("'+escCss(custom.bgImage)+'");') : '';
      var bgOp = custom.bgOpacity != null ? ('opacity:'+custom.bgOpacity+';') : '';
      customCss = [
        '.ps2-root{',
          '--ac:'+accent+';',
          'background:'+bg+';'+bgImg,
          'color:'+text+';',
          'border-color:'+border+';',
          'font-family:'+font+';',
          'border-radius:12px;border:1px solid '+border+';padding:18px;line-height:1.6;',
          bgOp,
        '}',
        '.ps2-root .ps2-title{color:'+accent+';border-bottom-color:'+border+';}',
        '.ps2-root .ps2-sec{background:rgba(127,127,127,.06);border:1px solid '+border+';border-radius:8px;padding:12px 13px;margin-bottom:12px;}',
        '.ps2-root .ps2-sec-h{color:'+accent+';display:flex;align-items:center;gap:6px;}',
        '.ps2-root .ps2-opt{background:'+bg+';color:'+text+';border:1px solid '+border+';border-radius:6px;padding:7px 14px;cursor:pointer;font:inherit;font-size:14px;transition:.12s;}',
        '.ps2-root .ps2-opt:hover{background:rgba(0,0,0,.04);}',
        '.ps2-root .ps2-opt.on{background:'+accent+';color:#fff;border-color:'+accent+';}',
        '.ps2-root .ps2-custom{background:'+bg+';border:1px solid '+border+';color:'+text+';border-radius:6px;padding:8px 11px;font:inherit;font-size:13px;resize:vertical;min-height:42px;}',
        '.ps2-root .ps2-go{background:'+accent+';color:#fff;border:none;border-radius:8px;padding:12px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.12s;}',
        '.ps2-root .ps2-go:hover{filter:brightness(.92);}',
        '.ps2-root .ps2-preview{border-color:'+accent+';}',
        '.ps2-root .ps2-tab{color:'+text+';}',
        '.ps2-root .ps2-tab.on{color:'+accent+';border-bottom-color:'+accent+';}',
        '.ps2-root .ps2-boot{display:none;}'
      ].join('');
    }
    var theme = THEMES[themeKey] || THEMES.skeuo;
    var themeCss = useCustom ? '' : theme.css('.ps2-root', project.accent || '#7a4a18');
    var allCss = (useCustom ? customCss : themeCss) + tabsCss('.ps2-root') + tipCss('.ps2-root') + previewCss('.ps2-root') + nestCss('.ps2-root');

    function ownGroup(node){
      if (!(node.options && node.options.length) && !node.allowCustom) return '';
      var opts = (node.options || []).map(function(o){
        var tip = o.tip ? (' data-tip="'+escAttr(o.tip)+'"') : '';
        var actual = (o.value !== undefined && o.value !== null && o.value !== '') ? o.value : o.label;
        var imgHtml = '';
        if (o.image && o.image.trim()) {
          var size = o.imageSize || 16;
          var pos = o.imagePosition || 'left';
          var style = 'width:'+size+'px;height:'+size+'px;object-fit:contain;display:inline-block;vertical-align:middle;';
          if (pos === 'left') style += 'margin-right:4px;';
          else if (pos === 'right') style += 'margin-left:4px;';
          else if (pos === 'top') style += 'display:block;margin:0 auto 2px;';
          else if (pos === 'bottom') style += 'display:block;margin:2px auto 0;';
          imgHtml = '<img src="'+escAttr(o.image.trim())+'" alt="" style="'+style+'">';
        }
        var content = '';
        if (o.imagePosition === 'top') content = imgHtml + '<span>'+escHtml(o.label)+'</span>';
        else if (o.imagePosition === 'bottom') content = '<span>'+escHtml(o.label)+'</span>' + imgHtml;
        else if (o.imagePosition === 'right') content = '<span>'+escHtml(o.label)+'</span>' + imgHtml;
        else content = imgHtml + '<span>'+escHtml(o.label)+'</span>';
        return '<button type="button" class="ps2-opt" data-label="'+escAttr(actual)+'"'+tip+'>'+content+'</button>';
      }).join('');
      var customHtml = '';
      if (node.allowCustom) {
        var hasPreset = node.customPreset && node.customDefault && node.customDefault.trim();
        var val = (hasPreset && node.customPreset) ? node.customDefault : '';
        var ph = node.customHint || '自定义填写…';
        customHtml = '<textarea class="ps2-custom" placeholder="'+escAttr(ph)+'"'+(val ? ('>'+escHtml(val)+'</textarea>') : '></textarea>');
      }
      var maxAttr = (node.selection === 'multiple' && node.maxSelections > 0) ? (' data-max="'+node.maxSelections+'"') : '';
      return '<div class="ps2-group" data-group data-multi="'+(node.selection === 'multiple' ? '1' : '0')+'" data-title="'+escAttr(node.title)+'"'+maxAttr+'><div class="ps2-opts">'+opts+'</div>'+customHtml+'</div>';
    }

    function nodeIconMarkup(node){
      if (!(node.icon && node.icon.trim())) return '';
      var nSize = node.iconSize || 20;
      var nPos = node.iconPosition || 'left';
      var nStyle = 'width:'+nSize+'px;height:'+nSize+'px;object-fit:contain;vertical-align:middle;';
      if (nPos === 'left') nStyle += 'margin-right:6px;';
      else if (nPos === 'right') nStyle += 'margin-left:6px;';
      else if (nPos === 'top') nStyle += 'display:block;margin:0 auto 4px;';
      else if (nPos === 'bottom') nStyle += 'display:block;margin:4px auto 0;';
      return '<img src="'+escAttr(node.icon.trim())+'" alt="" style="'+nStyle+'">';
    }

    function renderNode(node, depth, asTab){
      var titleTip = boardTipMarkup(node);
      var icon = nodeIconMarkup(node);
      var nPos = node.iconPosition || 'left';
      var titleInner = (nPos === 'right' || nPos === 'bottom')
        ? ('<span class="ps2-sec-title">'+escHtml(node.title)+'</span>'+icon+titleTip)
        : (icon+'<span class="ps2-sec-title">'+escHtml(node.title)+'</span>'+titleTip);
      var header = asTab ? '' : ('<div class="ps2-sec-h">'+titleInner+'</div>');
      var body = ownGroup(node) + renderChildren(node, depth);
      if (!body) body = '<div class="ps2-opts"></div>';
      var attr = '';
      if (node.tip || node.tipImage) attr += ' title="'+escAttr((node.tip || '') + (node.tipImage ? ' ' : ''))+'"';
      if (node.children && node.children.length && node.childExclusive) attr += ' data-child-exclusive="1"';
      return '<div class="ps2-sec ps2-lv'+depth+'"'+attr+'>'+header+body+'</div>';
    }

    function renderChildren(node, depth){
      var kids = node.children || [];
      if (!kids.length) return '';
      if (node.layout === 'tabs') {
        var bar = kids.map(function(c, i){
          var tip = boardTipMarkup(c);
          var titleHtml = nodeIconMarkup(c)+'<span class="ps2-sec-title">'+escHtml(c.title || ('板块'+(i+1)))+tip+'</span>';
          var tipTitle = (c.tip || c.tipImage) ? escAttr((c.tip || '') + (c.tipImage ? ' ' : '')) : '';
          return '<button type="button" class="ps2-tab'+(i===0 ? ' on' : '')+'" data-tab="'+i+'"'+(tipTitle ? (' title="'+tipTitle+'"') : '')+'>'+titleHtml+'</button>';
        }).join('');
        var panels = kids.map(function(c, i){
          return '<div class="ps2-tabpanel'+(i===0 ? ' on' : '')+'" data-panel="'+i+'">'+renderNode(c, depth+1, true)+'</div>';
        }).join('');
        return '<div class="ps2-tabs" data-tabs><div class="ps2-tabbar">'+bar+'</div><div class="ps2-tabwrap">'+panels+'</div></div>';
      }
      return '<div class="ps2-children">'+kids.map(function(c){ return renderNode(c, depth+1, false); }).join('')+'</div>';
    }

    var secHtml = '';
    if (project.rootLayout === 'tabs' && project.sections.length) {
      var rbar = project.sections.map(function(sec, i){
        var tip = boardTipMarkup(sec);
        var titleHtml = nodeIconMarkup(sec)+'<span class="ps2-sec-title">'+escHtml(sec.title || ('板块'+(i+1)))+tip+'</span>';
        var tipTitle = (sec.tip || sec.tipImage) ? escAttr((sec.tip || '') + (sec.tipImage ? ' ' : '')) : '';
        return '<button type="button" class="ps2-tab'+(i===0 ? ' on' : '')+'" data-tab="'+i+'"'+(tipTitle ? (' title="'+tipTitle+'"') : '')+'>'+titleHtml+'</button>';
      }).join('');
      var rpanels = project.sections.map(function(sec, i){
        return '<div class="ps2-tabpanel'+(i===0 ? ' on' : '')+'" data-panel="'+i+'">'+renderNode(sec, 1, true)+'</div>';
      }).join('');
      secHtml = '<div class="ps2-tabs" data-tabs><div class="ps2-tabbar">'+rbar+'</div><div class="ps2-tabwrap">'+rpanels+'</div></div>';
    } else {
      secHtml = project.sections.map(function(sec){ return renderNode(sec, 1, false); }).join('');
    }

    var titleIcon = '';
    if (project.icon && project.icon.trim()) {
      var iconSize = project.iconSize || 24;
      var iconPos = project.iconPosition || 'left';
      var style = 'width:'+iconSize+'px;height:'+iconSize+'px;object-fit:contain;vertical-align:middle;';
      if (iconPos === 'left') style += 'margin-right:6px;';
      else if (iconPos === 'right') style += 'margin-left:6px;';
      else if (iconPos === 'top') style += 'display:block;margin:0 auto 4px;';
      else if (iconPos === 'bottom') style += 'display:block;margin:4px auto 0;';
      titleIcon = '<img src="'+escAttr(project.icon.trim())+'" alt="" style="'+style+'">';
    }
    var headAttr = escAttr(project.head || '');
    var footAttr = escAttr(project.foot || '');
    var titleHtml = '<div class="ps2-title">'+titleIcon+escHtml(project.title || '开局面板')+'</div>';
    var previewHtml = project.showPreview ? ('<div class="ps2-preview" data-preview><div class="ps2-preview-h">'+escHtml(project.previewTitle || '已选设定预览')+'</div><div class="ps2-preview-body" data-preview-body data-ph="'+escAttr(project.previewPlaceholder || '在上方选择选项，这里会实时汇总。')+'"></div></div>') : '';
    var goHtml = '<button type="button" class="ps2-go">'+escHtml(project.button || '生成并注入')+'</button>';
    var engine = buildEngine();
    var idSeed = (useCustom ? 'custom' : themeKey) + '|' + project.title + '|' + secHtml + '|' + (project.showPreview ? 'P' : '');
    var rootId = hashId(idSeed);
    var styleTag = '<style>'+allCss+'</style>';
    var rootHtml = '<div class="ps2-root '+rootId+'" data-head="'+headAttr+'" data-foot="'+footAttr+'" onclick="event.stopPropagation()">'
      + titleHtml + secHtml + previewHtml + goHtml
      + '<img src="x" alt="" class="ps2-boot" onerror="'+escAttr(engine)+'">'
      + '</div>';
    return { css: allCss, styleTag: styleTag, rootHtml: rootHtml, rootId: rootId };
  };

  if (typeof renderEditor === 'function') {
    try { renderEditor(); } catch (e) {}
  }
  if (typeof refreshPreview === 'function') {
    try { refreshPreview(); } catch (e2) {}
  }
})();
</script>
