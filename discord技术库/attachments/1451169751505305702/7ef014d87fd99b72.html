<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒馆KV-Robust开发环境 V4.1 (修复版)</title>
<style>
    /* === V4.1 界面样式 === */
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #1e1e1e; overflow: hidden; }
    
    header {
        height: 50px; background: #2d2d2d; border-bottom: 1px solid #3e3e3e;
        display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        color: #ccc; user-select: none;
    }
    h1 { font-size: 16px; margin: 0; color: #fff; display: flex; align-items: center; gap: 10px; }
    .badge { background: #00897B; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; box-shadow: 0 0 10px rgba(0, 137, 123, 0.4); }

    .controls { display: flex; gap: 15px; align-items: center; font-size: 13px; }
    
    .toggle-group { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .toggle-group input { accent-color: #00897B; cursor: pointer; }
    .toggle-group span { color: #aaa; transition: color 0.2s; }
    .toggle-group:hover span { color: #fff; }

    button.action-btn {
        background: #444; color: #fff; border: 1px solid #555; padding: 5px 12px; 
        border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 12px;
    }
    button.action-btn:hover { background: #555; border-color: #666; }
    
    button.ai-btn {
        background: linear-gradient(135deg, #7B1FA2, #512DA8);
        border: 1px solid #9C27B0;
        font-weight: bold;
        display: flex; align-items: center; gap: 5px;
    }
    button.ai-btn:hover {
        background: linear-gradient(135deg, #9C27B0, #673AB7);
        box-shadow: 0 0 12px rgba(156, 39, 176, 0.5);
    }

    .main-container { display: flex; height: calc(100% - 50px); position: relative; }
    .editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid #3e3e3e; }
    textarea#code-input {
        flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px;
        font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; line-height: 1.5;
        resize: none; outline: none; white-space: pre; overflow-wrap: normal; overflow-x: auto;
    }

    .preview-pane { width: 50%; display: flex; flex-direction: column; background: #1a1b20; position: relative; }
    .preview-header { 
        background: #252526; padding: 5px 10px; color: #858585; font-size: 12px; 
        border-bottom: 1px solid #333; display: flex; justify-content: space-between;
    }
    iframe#preview-frame { width: 100%; height: 100%; border: none; background: #1a1b20; }

    /* AI Modal */
    .ai-modal {
        position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
        width: 400px; background: #252526; border: 1px solid #444;
        border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        z-index: 1000; padding: 20px;
        display: none; 
    }
    .ai-modal.active { display: block; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 10px; opacity: 1; } }

    .ai-field { margin-bottom: 15px; }
    .ai-label { display: block; color: #aaa; font-size: 12px; margin-bottom: 5px; }
    .ai-input { 
        width: 100%; background: #1e1e1e; border: 1px solid #3e3e3e; color: #fff; 
        padding: 8px; border-radius: 4px; box-sizing: border-box; font-family: sans-serif;
    }
    .ai-input:focus { border-color: #7B1FA2; outline: none; }
    textarea.ai-input { height: 80px; resize: vertical; }

    .ai-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .ai-loading { color: #FFB74D; font-size: 12px; display: none; align-items: center; gap: 5px; }
</style>
</head>
<body>

<header>
    <h1>酒馆开发工具 <span class="badge">V4.1 Fixed</span></h1>
    <div class="controls">
        <label class="toggle-group" title="刷新时保持当前滚动位置">
            <input type="checkbox" id="keep-scroll" checked>
            <span>🔒 滚动记忆</span>
        </label>
        <!-- 修复点1：默认勾选底部对齐 -->
        <label class="toggle-group" title="内容从底部堆叠，模拟真实酒馆体验">
            <input type="checkbox" id="bottom-align" onchange="updatePreview()" checked>
            <span>⬇️ 底部对齐</span>
        </label>
        <button class="ai-btn" onclick="toggleAIModal()">✨ AI 灵感</button>
        <button class="action-btn" onclick="resetTemplate()">🔄 重置模板</button>
    </div>
</header>

<div class="main-container">
    <!-- AI 模态框 -->
    <div id="ai-modal" class="ai-modal">
        <h3 style="margin:0 0 15px 0; color:#fff; font-size:16px;">✨ Gemini 角色数据生成器</h3>
        <div class="ai-field">
            <label class="ai-label">Gemini API Key (本地存储，不上传)</label>
            <input type="password" id="gemini-key" class="ai-input" placeholder="输入你的 Google Gemini API Key">
        </div>
        <div class="ai-field">
            <label class="ai-label">角色概念描述 / 灵感 Prompt</label>
            <textarea id="ai-prompt" class="ai-input" placeholder="例如：一个在赛博朋克世界里经营拉面摊的前雇佣兵..."></textarea>
        </div>
        <div class="ai-footer">
            <span id="ai-status" class="ai-loading">✨ 连接中...</span>
            <button class="action-btn" onclick="toggleAIModal()">关闭</button>
            <button class="ai-btn" onclick="callGemini()">🚀 生成</button>
        </div>
    </div>

    <div class="editor-pane">
        <textarea id="code-input" placeholder="代码加载中..." spellcheck="false"></textarea>
    </div>
    <div class="preview-pane">
        <iframe id="preview-frame"></iframe>
    </div>
</div>

<script>
    // --- 1. AI 逻辑 (Gemini API) ---
    document.getElementById('gemini-key').value = localStorage.getItem('gemini_api_key') || '';

    function toggleAIModal() {
        document.getElementById('ai-modal').classList.toggle('active');
    }

    async function callGemini() {
        const apiKey = document.getElementById('gemini-key').value.trim();
        const userPrompt = document.getElementById('ai-prompt').value.trim();
        const statusEl = document.getElementById('ai-status');

        if (!apiKey) { alert('请输入 API Key'); return; }
        if (!userPrompt) { alert('请输入描述'); return; }

        localStorage.setItem('gemini_api_key', apiKey);
        statusEl.style.display = 'flex';
        statusEl.innerText = '✨ 构思中...';

        const systemInstruction = `
            You are a Data Architect for a Roleplay Character Card.
            Convert the user's description into this exact JSON format:
            {
                "kv_block": "DGS_KV_PANEL_V2_START▶name::{name};;race::{race};;class::{class};;level::{level};;money::{money};;location::{location};;event::{event};;status::{status};;lust::{0-100};;submit::{0-100};;dev::{0-100};;round::{int};;◀DGS_KV_PANEL_V2_END",
                "suggestions": ["Button1", "Button2", "Button3"]
            }
            Language: Chinese (Simplified).
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            if (!response.ok) throw new Error('API Error');
            const data = await response.json();
            const resultJSON = JSON.parse(data.candidates[0].content.parts[0].text);
            applyAIResult(resultJSON);
            statusEl.innerText = '✅ 成功';
            setTimeout(() => { toggleAIModal(); statusEl.style.display = 'none'; }, 1000);
        } catch (error) {
            console.error(error);
            statusEl.innerText = '❌ 失败';
            alert('生成失败，请检查网络或 Key。');
        }
    }

    function applyAIResult(aiData) {
        let currentCode = codeInput.value;
        const kvRegex = /DGS_KV_PANEL_V2_START▶[\s\S]*?◀DGS_KV_PANEL_V2_END/;
        if (kvRegex.test(currentCode)) {
            let cleanKV = aiData.kv_block.replace(/\\n/g, '');
            currentCode = currentCode.replace(kvRegex, cleanKV);
        }
        if (aiData.suggestions && aiData.suggestions.length >= 1) {
             let btnRegex = /<div class="teapot-btn" onclick="([\s\S]*?)">([\s\S]*?)<\/div>/g;
             let count = 0;
             currentCode = currentCode.replace(btnRegex, (match, script, text) => {
                 if (count < aiData.suggestions.length) {
                     let newText = aiData.suggestions[count];
                     let newScript = `
                var t = document.querySelector('.chat .chat-bottom .uni-textarea .chat-input-scope textarea');
                if(t){
                    var v = t.value; 
                    t.value = v + (v?'\\\\\\\\n':'') + '${newText.replace(/'/g, "\\'") + " (AI建议)"}'; 
                    t.dispatchEvent(new Event('input'));
                }
            `;
                     count++;
                     return `<div class="teapot-btn" onclick="${newScript}">${newText}</div>`;
                 }
                 return match;
             });
        }
        codeInput.value = currentCode;
        codeInput.dispatchEvent(new Event('input'));
    }

    // --- 2. 纯净版模板 (Clean Template) ---
    const defaultCode = `<style>
/* === 基础容器样式 === */
.teapot-robust-container {
    box-sizing: border-box;
    margin: 8px; padding: 16px;
    font-family: 'Segoe UI', serif;
    background: linear-gradient(160deg, #101216, #1C2028);
    border: 1px solid #3E2723;
    border-radius: 8px;
    color: #E0E0E0; font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    position: relative; overflow: hidden;
}
.teapot-robust-container h4 {
    margin: 12px 0 8px 0; padding-bottom: 4px;
    color: #FFB74D; border-bottom: 1px solid rgba(255, 183, 77, 0.2);
    font-size: 1.1em; font-weight: bold;
}
.teapot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.teapot-grid.col5 { grid-template-columns: repeat(5, 1fr); }
.teapot-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid #5D4037; color: #D7CCC8;
    padding: 8px 4px; border-radius: 4px;
    text-align: center; cursor: pointer; font-size: 13px;
    transition: all 0.2s; user-select: none;
    display: flex; align-items: center; justify-content: center; min-height: 32px;
}
.teapot-btn:hover { background: rgba(255,255,255,0.1); color: #FFF; border-color: #8D6E63; }
.teapot-btn:active { transform: translateY(1px); }

.teapot-extra-group .teapot-btn {
    border-color: #00695C; color: #B2DFDB; background: rgba(0, 77, 64, 0.4);
}
.teapot-extra-group .teapot-btn:hover {
    border-color: #26A69A; color: #E0F2F1; background: rgba(0, 150, 136, 0.3);
}

.teapot-status-panel {
    background: rgba(0,0,0,0.3); border-radius: 6px;
    padding: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05);
}
.ts-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 4px; }
.ts-label { color: #BCAAA4; font-weight: bold; }
.ts-val { color: #FFF; font-family: monospace; }
.ts-val-highlight { color: #FFD54F; font-weight: bold; }
.ts-bar-row { display: flex; align-items: center; margin-top: 5px; font-size: 12px; }
.ts-bar-track { flex: 1; height: 6px; background: #333; margin: 0 8px; border-radius: 3px; overflow: hidden; }
.ts-bar-fill { height: 100%; background: linear-gradient(90deg, #FF7043, #FFCA28); width: 0%; transition: width 0.5s; }
.kv-data-layer { display: none !important; }
@media(max-width: 600px){ .teapot-grid, .teapot-grid.col5 { grid-template-columns: repeat(3, 1fr); } }
</style>

<!-- KV-Robust V2.0 通用模板 -->
<div class="teapot-robust-container" onclick="event.stopPropagation()">
    
    <!-- 纯净版数据层：所有值已设为通用占位符 -->
    <div class="kv-data-layer">
        DGS_KV_PANEL_V2_START▶name::姓名;;race::种族;;class::职业;;level::Lv.1;;money::0 G;;location::初始地点;;event::无;;status::正常;;lust::0;;submit::0;;dev::0;;round::1;;◀DGS_KV_PANEL_V2_END
    </div>

    <div class="teapot-intro">
        <p>系统提示：检测到交互对象【<span class="ds-val-name">...</span>】。请选择你的行动。</p>
    </div>

    <div class="teapot-interactions">
        <h4>📝 快捷指令</h4>
        <div class="teapot-grid col5">
            <div class="teapot-btn" onclick="
                var t = document.querySelector('.chat .chat-bottom .uni-textarea .chat-input-scope textarea');
                if(t){
                    var v = t.value; t.value = v + (v?'\\\\n':'') + '指令：攻击'; t.dispatchEvent(new Event('input'));
                }
            ">攻击</div>
            <div class="teapot-btn" onclick="
                var t = document.querySelector('.chat .chat-bottom .uni-textarea .chat-input-scope textarea');
                if(t){
                    var v = t.value; t.value = v + (v?'\\\\n':'') + '指令：交涉'; t.dispatchEvent(new Event('input'));
                }
            ">交涉</div>
            <div class="teapot-btn" onclick="
                var t = document.querySelector('.chat .chat-bottom .uni-textarea .chat-input-scope textarea');
                if(t){
                    var v = t.value; t.value = v + (v?'\\\\n':'') + '指令：观察'; t.dispatchEvent(new Event('input'));
                }
            ">观察</div>
        </div>
        
        <div class="teapot-extra-group">
            <h4>🎒 额外物品</h4>
            <div class="teapot-grid">
                <div class="teapot-btn" onclick="/* 自定义 JS */">物品A</div>
                <div class="teapot-btn" onclick="/* 自定义 JS */">物品B</div>
            </div>
        </div>
    </div>

    <div class="teapot-status-panel">
        <h4>【 角色状态 (第 <span class="ds-val-round">-</span> 轮) 】</h4>
        <div class="ts-row">
            <span><span class="ts-label">姓名:</span> <span class="ts-val ds-val-name">...</span></span>
            <span><span class="ts-label">等级:</span> <span class="ts-val ds-val-level">...</span></span>
        </div>
        <div class="ts-row">
            <span><span class="ts-label">种族:</span> <span class="ts-val ds-val-race">...</span></span>
            <span><span class="ts-label">职业:</span> <span class="ts-val ds-val-class">...</span></span>
        </div>
        <div class="ts-row" style="margin-top:8px;">
            <span style="width:100%"><span class="ts-label">📍 地点:</span> <span class="ts-val ts-val-highlight ds-val-location">...</span></span>
        </div>
        <div class="ts-row">
            <span style="width:100%"><span class="ts-label">🔥 事件:</span> <span class="ts-val ts-val-highlight ds-val-event">...</span></span>
        </div>
        
        <div class="ts-bar-row">
            <span class="ts-label" style="width:40px">属性1</span>
            <div class="ts-bar-track"><div class="ts-bar-fill ds-bar-lust" style="width:0%"></div></div>
            <span class="ts-val ds-val-lust">0</span>%
        </div>
        <div class="ts-bar-row">
            <span class="ts-label" style="width:40px">属性2</span>
            <div class="ts-bar-track"><div class="ts-bar-fill ds-bar-submit" style="width:0%"></div></div>
            <span class="ts-val ds-val-submit">0</span>%
        </div>
    </div>

    <img src="x" style="display:none" onerror="
        var c = this.parentNode;
        var d = c.querySelector('.kv-data-layer');
        if(d) {
            var txt = d.innerText || d.textContent;
            var m = txt.match(/DGS_KV_PANEL_V2_START▶(.*?)◀DGS_KV_PANEL_V2_END/s);
            if(m) {
                var pairs = m[1].split(';;');
                pairs.forEach(function(p) {
                    var pt = p.split('::');
                    if(pt.length >= 2) {
                        var k = pt[0].trim();
                        var v = pt[1].trim();
                        c.querySelectorAll('.ds-val-' + k).forEach(function(el){ el.innerText = v; });
                        c.querySelectorAll('.ds-bar-' + k).forEach(function(el){ el.style.width = v + '%'; });
                    }
                });
            }
        }
        this.remove();
    ">
</div>`;

    // --- 3. 编辑器逻辑 ---
    const codeInput = document.getElementById('code-input');
    const previewFrame = document.getElementById('preview-frame');
    const keepScrollCheckbox = document.getElementById('keep-scroll');
    const bottomAlignCheckbox = document.getElementById('bottom-align');

    function resetTemplate() {
        codeInput.value = defaultCode;
        updatePreview();
    }

    let timeout;
    codeInput.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(updatePreview, 500);
    });

    function updatePreview() {
        let userCode = codeInput.value;
        let isBottomAlign = bottomAlignCheckbox.checked;
        let currentScrollY = 0;
        if (keepScrollCheckbox.checked && previewFrame.contentWindow) {
            try { currentScrollY = previewFrame.contentWindow.scrollY; } catch(e) {}
        }

        const htmlParts = [
            `<!DOCTYPE html>
            <html lang="zh-CN">
            <head>
                <style>
                    body { 
                        background-color: #1a1b20; color: #fff; 
                        /* 修复点2：确保 iframe 高度撑开，padding 留给 input */
                        margin: 0; padding: 20px; padding-bottom: 120px; 
                        font-family: sans-serif; 
                        ${isBottomAlign ? `
                            display: flex; 
                            flex-direction: column; 
                            justify-content: flex-end; 
                            min-height: 100vh;
                            box-sizing: border-box;
                        ` : ''}
                    }
                    /* 修复点3：增强 input 区域的层级和定位 */
                    .mock-ui-layer { 
                        position: fixed; bottom: 0; left: 0; right: 0; 
                        background: #2c2e33; padding: 15px; border-top: 1px solid #444; 
                        z-index: 2147483647; /* 确保在最顶层 */
                        box-sizing: border-box;
                    }
                    .mock-hint { color: #888; font-size: 12px; margin-bottom: 5px; display: block; }
                    .chat .chat-bottom .uni-textarea .chat-input-scope textarea { 
                        width: 100%; height: 60px; background: #111; color: #eee; 
                        border: 1px solid #555; border-radius: 4px; padding: 10px; 
                        font-family: monospace; resize: none; display: block; 
                        box-sizing: border-box;
                    }
                    .chat .chat-bottom .uni-textarea .chat-input-scope textarea:focus { border-color: #00897B; outline: none; }
                </style>
            </head>
            <body>
                <!-- 用户生成的卡片 -->
                <div id="user-content-wrapper">`,
            userCode,
            `   </div>
                <!-- 模拟的网站环境 -->
                <div class="mock-ui-layer">
                    <span class="mock-hint">👇 模拟酒馆输入框 (.chat .chat-bottom ... textarea)</span>
                    <div class="chat"><div class="chat-bottom"><div class="uni-textarea"><div class="chat-input-scope">
                        <textarea placeholder="点击上方按钮测试..."></textarea>
                    </div></div></div></div>
                </div>
                <script>
                    window.addEventListener('DOMContentLoaded', () => { window.scrollTo(0, ${currentScrollY}); });
                <\/script>
            </body>
            </html>`
        ];
        previewFrame.srcdoc = htmlParts.join('');
    }

    if(!codeInput.value.trim()) { resetTemplate(); } else { updatePreview(); }
</script>
</body>
</html>
